<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>LUDIK AI</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root {
    --bg: #050505;
    --neon: #bc13fe;
    --gold: linear-gradient(180deg,#ffe57e 0%,#d4af37 40%,#b8860b 100%);
}
* { box-sizing: border-box; margin:0; padding:0; -webkit-tap-highlight-color: transparent;}
html, body {height:100%; width:100%; overflow:hidden; background: var(--bg); font-family: 'Inter', sans-serif; color:white; position: relative;}
body {display:flex; flex-direction:column; align-items:center; padding:20px;}
.app-title {font-family:'Orbitron', sans-serif; font-size:20px; background: var(--gold); -webkit-background-clip:text; -webkit-text-fill-color:transparent; text-transform:uppercase; margin:10px 0 20px; text-shadow:0 0 15px rgba(188,19,254,0.6); animation: neonGlow 2s infinite alternate;}
.main-card {width:100%; max-width:420px; background:rgba(15,15,15,0.98); border:2px solid var(--neon); border-radius:30px; padding:20px; box-shadow:0 0 20px var(--neon); z-index:10; position:relative; touch-action:auto;}
.menu-grid {display:grid; grid-template-columns:1fr 1fr; gap:12px;}
.menu-item {background:#111; border:2px solid var(--neon); border-radius:25px; padding:25px 10px; text-align:center; cursor:pointer; position:relative; z-index:20; display:flex; flex-direction:column; align-items:center; justify-content:center; touch-action: manipulation; transition: all 0.3s ease-in-out;}
.menu-item:hover { box-shadow: 0 0 20px #bc13fe, 0 0 40px #bc13fe inset; transform: scale(1.05); border-color: #ffe57e;}
.menu-item:active {background:#222; transform:scale(0.95); border-color:#ffe57e;}
.gold-icon {font-size:28px; display:block; margin-bottom:5px; pointer-events:none;}
.item-label {font-size:11px; color:#f3cf7a; text-transform:uppercase; font-weight:900; pointer-events:none;}
.overlay {display:none; position:fixed; inset:0; background:rgba(0,0,0,0.95); z-index:900;}
.popup {display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%) scale(0.8); width:90%; max-width:380px; background:#0a0a0a; border:2px solid #d4af37; border-radius:25px; padding:20px; z-index:1000; text-align:center; overflow-y:auto; max-height:80%; opacity:0; transition: transform 0.3s ease, opacity 0.3s ease;}
.popup.open {transform:translate(-50%, -50%) scale(1); opacity:1;}
.close-btn {background:#222; color:#888; padding:12px; width:100%; border-radius:15px; margin-top:15px; border:1px solid #444; font-weight:bold; transition: all 0.2s;}
.close-btn:hover {background:#333; color:#fff;}
.action-btn {background:var(--gold); color:black; padding:14px; width:100%; border-radius:15px; margin-top:10px; border:none; font-weight:900; display:inline-block; text-decoration:none; transition: all 0.2s;}
.action-btn:hover {box-shadow: 0 0 15px #ffe57e, 0 0 25px #d4af37 inset; transform: scale(1.02);}
.league-grid {display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:10px;}
.league-btn {background:#1a1a1a; color:white; border:1px solid #333; padding:10px; border-radius:12px; font-size:11px; cursor:pointer; transition: all 0.2s;}
.league-btn:hover {background:#222; border-color:#ffe57e;}
.stat-row {display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px solid #222; font-size:14px;}
.gold-t {color:#d4af37; font-weight:bold;}
.bonus-link {display:block; background:#111; color:#ffe57e; padding:12px; margin:8px 0; border-radius:12px; text-decoration:none; border:1px solid #d4af37; font-weight:bold; transition: all 0.2s;}
.bonus-link:hover {background:#222; color:#fff;}
table {width:100%; border-collapse:collapse; margin-top:10px;}th, td {border:1px solid #444; padding:8px; font-size:12px; text-align:center;} th {background:#1a1a1a;}@keyframes neonGlow {0%,100% { text-shadow: 0 0 10px #bc13fe,0 0 20px #bc13fe,0 0 30px #bc13fe,0 0 40px #bc13fe;}50%{text-shadow:0 0 20px #ffe57e,0 0 30px #ffe57e,0 0 40px #ffe57e,0 0 50px #ffe57e;}}
</style>
</head>
<body ontouchstart="tg.expand()">

<div class="app-title">LUDIK AI</div>

<div class="main-card">
    <div class="menu-grid">
        <div class="menu-item" onclick="openPredict()"><span class="gold-icon">⚽️</span><span class="item-label">ПРОГНОЗЫ</span></div>
        <div class="menu-item" onclick="openP('vipP')"><span class="gold-icon">💎</span><span class="item-label">VIP ДОСТУП</span></div>
        <div class="menu-item" onclick="openP('profileP')"><span class="gold-icon">👤</span><span class="item-label">ПРОФИЛЬ</span></div>
        <div class="menu-item" onclick="openP('bonusP')"><span class="gold-icon">🎁</span><span class="item-label">БОНУСЫ</span></div>
        <div class="menu-item" onclick="openP('refP')"><span class="gold-icon">🔗</span><span class="item-label">РЕФЕРАЛ</span></div>
        <div class="menu-item" onclick="openP('statsP')"><span class="gold-icon">📊</span><span class="item-label">СТАТИСТИКА</span></div>
        <div class="menu-item" onclick="openP('battleP')"><span class="gold-icon">⚔️</span><span class="item-label">БИТВА ЛУДИКОВ</span></div>
        <div class="menu-item" onclick="openP('jbP')"><span class="gold-icon">🔥</span><span class="item-label">ЖБ ДНЯ</span></div>
        <div class="menu-item" onclick="openP('historyP')"><span class="gold-icon">📜</span><span class="item-label">ИСТОРИЯ ПРОГНОЗОВ</span></div>
        <div class="menu-item" onclick="openP('chatP')"><span class="gold-icon">💬</span><span class="item-label">ЧАТ</span></div>
    </div>
</div>

<div class="overlay" id="overlay" onclick="closeAll()"></div>

<!-- ПРОГНОЗЫ -->
<div id="predictP" class="popup">
    <h3 style="color:#ffe57e">ЛИГИ</h3>
    <div class="league-grid" id="leagueBox"></div>
    <div id="pRes" style="margin-top:15px; color:#00ff00; font-size:13px;"></div>
    <button class="close-btn" onclick="closeAll()">ЗАКРЫТЬ</button>
</div>

<!-- ЖБ ДНЯ -->
<div id="jbP" class="popup">
    <h2 style="color:#bc13fe">ЖБ ДНЯ</h2>
    <p id="jbContent" style="font-size:12px; margin:15px 0;">Прогноз дня: ТБ 2.5 – Лудик уверен!</p>
    <button class="close-btn" onclick="closeAll()">ЗАКРЫТЬ</button>
</div>

<script>
// =======================
// Инициализация Telegram WebApp
// =======================
const tg = window.Telegram.WebApp;
tg.ready();
tg.expand();

const user = tg.initDataUnsafe?.user;
if(user){
    document.getElementById('uID')?.innerText = user.id;
    document.getElementById('refLink')?.innerText = 'https://t.me/LudikWin_bot?start='+user.id;
}

function openP(id){
    closeAll();
    document.getElementById('overlay').style.display='block';
    const popup=document.getElementById(id);
    popup.style.display='block';
    popup.classList.add('open');
    tg.expand();
}

function closeAll(){
    document.getElementById('overlay').style.display='none';
    document.querySelectorAll('.popup').forEach(p=>{
        p.style.display='none';
        p.classList.remove('open');
    });
}

// =======================
// Gemini + Football API
// =======================
const API_KEY = '7a5d573e9f134d42b4edaa35c408e019';
const GEMINI_KEY = 'AIzaSyAH_iOrLFX_B-9BGgd6oBuen95jE-wpejo';

async function fetchMatches(code) {
    const res = await fetch(`https://api.football-data.org/v4/competitions/${code}/matches?status=SCHEDULED`, {
        headers: {'X-Auth-Token': API_KEY}
    });
    const data = await res.json();
    const today = new Date();
    const tomorrow = new Date();
    tomorrow.setDate(today.getDate()+1);
    return data.matches.filter(m => {
        const d = new Date(m.utcDate);
        return d.toDateString()===today.toDateString() || d.toDateString()===tomorrow.toDateString();
    });
}

function cacheMatches(matches) {
    const stored = JSON.parse(localStorage.getItem('matches')||'[]');const newMatches = matches.filter(m => !stored.some(s => s.id===m.id));
    if(newMatches.length>0){
        localStorage.setItem('matches', JSON.stringify([...stored,...newMatches]));
    }
    return newMatches;
}

async function analyzeMatchesWithGemini(newMatches){
    if(newMatches.length===0) return [];
    const res = await fetch('https://gemini.googleapis.com/v1/predict',{
        method:'POST',
        headers:{
            'Authorization':'Bearer '+GEMINI_KEY,
            'Content-Type':'application/json'
        },
        body: JSON.stringify({
            matches: newMatches,
            task: "анализировать матчи и дать прогноз с уровнем уверенности"
        })
    });
    const predictions = await res.json();
    const cached = JSON.parse(localStorage.getItem('predictions')||'[]');
    localStorage.setItem('predictions', JSON.stringify([...cached, ...predictions]));
    return predictions;
}

function getCachedPredictions(){
    return JSON.parse(localStorage.getItem('predictions')||'[]');
}

// =======================
// Лиги с прогнозами (кнопки теперь работают)
// =======================
function openPredict() {
    openP('predictP'); 
    const box = document.getElementById('leagueBox');
    box.innerHTML = "";

    const leagues = {"PL":"АПЛ","PD":"Ла Лига","BL1":"Бундес","SA":"Серия А","CL":"ЛЧ","RPL":"РПЛ","MLS":"MLS","EL":"ЛЕ"};

    Object.keys(leagues).forEach(code => {
        const btn = document.createElement('button');
        btn.className = "league-btn";
        btn.innerText = leagues[code];
        btn.dataset.league = code;

        btn.addEventListener('click', async (e) => {
            const resBox = document.getElementById('pRes');
            resBox.innerText = "АНАЛИЗ...";
            const leagueCode = e.currentTarget.dataset.league;

            const matches = await fetchMatches(leagueCode);
            const newMatches = cacheMatches(matches);
            await analyzeMatchesWithGemini(newMatches);

            const predictions = getCachedPredictions().filter(p => p.competition === leagueCode);
            if(predictions.length === 0) { resBox.innerText = "Матчей нет"; return; }

            resBox.innerHTML = "";
            predictions.forEach(m=>{
                const div = document.createElement('div');
                div.style.marginBottom='8px';
                div.innerHTML = <b>${m.match}</b> — Прогноз: <span style="color:#ffe57e">${m.prediction}</span> (Уверенность: <span style="color:#00ff00">${m.confidence}</span>);
                resBox.appendChild(div);
            });

            // ЖБ дня — самый уверенный прогноз
            const best = predictions.reduce((a,b)=>parseFloat(a.confidence.replace('%',''))>parseFloat(b.confidence.replace('%',''))?a:b);
            document.getElementById('jbContent').innerHTML=`Прогноз дня: ${best.prediction} – Уверенность: ${best.confidence}`;
        });

        box.appendChild(btn);
    });
}

// =======================
// Остальная логика (копирование, битва, профили)
// =======================
function copyRef(){
    const link=document.getElementById('refLink').innerText;
    const el=document.createElement('textarea');
    el.value=link;
    document.body.appendChild(el);
    el.select();
    document.execCommand('copy');
    document.body.removeChild(el);
    tg.showAlert("Скопировано!");
}

function generateBattle(){
    const box=document.getElementById('battleBox');
    box.innerHTML="";
    const options=['Победа К1','Ничья','Победа К2'];
    options.forEach(o=>{
        const b=document.createElement('button');
        b.className='action-btn';
        b.innerText=o;
        b.onclick=()=>tg.showAlert('Вы выбрали: '+o);
        box.appendChild(b);
    });
}
generateBattle();

</script>
</body>
</html>
