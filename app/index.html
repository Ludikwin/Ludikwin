<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LUDIK AI</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #050505; --neon: #bc13fe; --gold: linear-gradient(180deg, #ffe57e 0%, #d4af37 40%, #b8860b 100%); }
        
        /* ХАК: Делаем страницу чуть больше экрана, чтобы спровоцировать разворот */
        html { background-color: var(--bg); }
        body { 
            background-color: var(--bg); color: white; font-family: 'Inter', sans-serif;
            display: flex; flex-direction: column; align-items: center; 
            min-height: 120vh; /* Ровно здесь магия */
            padding: 15px; margin: 0;
            overflow-x: hidden;
        }

        .app-title { font-family: 'Orbitron', sans-serif; font-size: 18px; background: var(--gold); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 15px 0 25px 0; text-transform: uppercase; }
        .main-card { width: 100%; max-width: 400px; background: rgba(15,15,15,0.98); border: 2px solid var(--neon); border-radius: 25px; padding: 20px; box-shadow: 0 0 20px rgba(188, 19, 254, 0.2); z-index: 5; }
        .balance-box { text-align: center; margin-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 15px; }
        .balance-amount { font-size: 32px; font-weight: 900; background: var(--gold); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 100%; }
        .menu-item { background: #111; border: 1px solid rgba(212, 175, 55, 0.2); border-radius: 18px; padding: 18px 10px; text-align: center; cursor: pointer; transition: 0.2s; }
        .menu-item:active { background: #1a1a1a; transform: scale(0.96); }
        
        .gold-icon { font-size: 24px; display: block; margin-bottom: 6px; }
        .item-label { font-size: 10px; color: #f3cf7a; text-transform: uppercase; font-weight: 800; letter-spacing: 0.5px; }
        
        /* Попапы */
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 99; }
        .popup { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 85%; background: #0a0a0a; border: 2px solid #d4af37; border-radius: 20px; padding: 25px; z-index: 100; text-align: center; }
        .row { display: flex; justify-content: space-between; margin-bottom: 12px; font-size: 13px; border-bottom: 1px solid #222; padding-bottom: 6px; }
        .gold-t { color: #d4af37; font-weight: bold; }
        .btn-link { display: block; width: 100%; background: var(--gold); color: black; text-decoration: none; padding: 14px; border-radius: 12px; font-weight: 900; margin: 10px 0; font-size: 12px; text-align: center; border: none; }
        .close-btn { background: none; border: 1px solid #444; color: #888; padding: 12px; width: 100%; border-radius: 12px; margin-top: 10px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body ontouchstart="forceExpand()">
    <div class="app-title">LUDIK AI PREDICTOR</div>
    
    <div class="main-card">
        <div class="balance-box">
            <div id="userBalance" class="balance-amount">100.00</div>
            <p style="color: var(--neon); font-size: 10px; font-weight: 900; letter-spacing: 2px;">LUDIK COINS</p>
        </div>
        
        <div class="menu-grid">
            <div class="menu-item" onclick="apiFetch('PL')"><span class="gold-icon">🏴󠁧󠁢󠁥󠁮󠁧󠁿</span><span class="item-label">АПЛ</span></div>
            <div class="menu-item" onclick="apiFetch('PD')"><span class="gold-icon">🇪🇸</span><span class="item-label">Ла Лига</span></div><div class="menu-item" onclick="apiFetch('BL1')"><span class="gold-icon">🇩🇪</span><span class="item-label">Бундеслига</span></div>
            <div class="menu-item" onclick="apiFetch('SA')"><span class="gold-icon">🇮🇹</span><span class="item-label">Серия А</span></div>
            <div class="menu-item" onclick="apiFetch('CL')"><span class="gold-icon">🔥</span><span class="item-label">ЖБ ДНЯ</span></div>
            <div class="menu-item" onclick="openP('profileP')"><span class="gold-icon">👤</span><span class="item-label">Профиль</span></div>
            <div class="menu-item" onclick="openP('bonusP')"><span class="gold-icon">🎁</span><span class="item-label">Бонусы</span></div>
            <div class="menu-item" onclick="openP('chatP')"><span class="gold-icon">💬</span><span class="item-label">Наш Чат</span></div>
        </div>
    </div>

    <div style="height: 50px;"></div>

    <div class="overlay" id="overlay" onclick="closeAll()"></div>
    <div id="predictP" class="popup"><h2 id="pTitle">АНАЛИЗ...</h2><div id="pStats" style="margin: 15px 0;"></div><button class="close-btn" onclick="closeAll()">ЗАКРЫТЬ</button></div>
    <div id="profileP" class="popup"><h2>ПРОФИЛЬ</h2><div class="row"><span>Баланс:</span><span class="gold-t">100.00 LC</span></div><button class="close-btn" onclick="closeAll()">ЗАКРЫТЬ</button></div>
    <div id="bonusP" class="popup"><h2>БОНУСЫ</h2><a href="https://t.me/+oEnEz7IOZ90wN2Ri" class="btn-link">ПОДПИСАТЬСЯ</a><button class="close-btn" onclick="closeAll()">ЗАКРЫТЬ</button></div>
    <div id="chatP" class="popup"><h2>ЧАТ</h2><a href="https://t.me/+BrVJbCy5i5hjMjYy" class="btn-link">ВОЙТИ</a><button class="close-btn" onclick="closeAll()">ЗАКРЫТЬ</button></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        
        function forceExpand() {
            if (!tg.isExpanded) {
                tg.expand();
            }
        }
        
        // Пытаемся развернуться сразу
        forceExpand();

        function openP(id) { document.getElementById('overlay').style.display = 'block'; document.getElementById(id).style.display = 'block'; }
        function closeAll() { document.getElementById('overlay').style.display = 'none'; const popups = document.querySelectorAll('.popup'); popups.forEach(p => p.style.display = 'none'); }

        async function apiFetch(code) {
            openP('predictP');
            document.getElementById('pTitle').innerText = "АНАЛИЗ...";
            document.getElementById('pStats').innerText = "Ищем лучшие коэффициенты...";
            try {
                const response = await fetch(`https://api.football-data.org/v4/competitions/${code}/matches?status=SCHEDULED`, {
                    headers: { 'X-Auth-Token': '7a5d573e9f134d42b4edaa35c408e019' }
                });
                const data = await response.json();
                if (data.matches && data.matches.length > 0) {
                    const m = data.matches[0];
                    document.getElementById('pTitle').innerText = m.homeTeam.name + " - " + m.awayTeam.name;
                    document.getElementById('pStats').innerHTML = `
                        <div class="row"><span>ПРОГНОЗ:</span><span class="gold-t">Победа ${m.homeTeam.name}</span></div>
                        <div class="row"><span>ВЕРОЯТНОСТЬ:</span><span style="color:#00ff00;">${Math.floor(Math.random()*(85-70)+70)}%</span></div>
                    `;
                } else {
                    document.getElementById('pTitle').innerText = "МАТЧЕЙ НЕТ";
                    document.getElementById('pStats').innerText = "На сегодня игр в этой лиге больше нет.";
                }
            } catch (e) { document.getElementById('pTitle').innerText = "ОШИБКА API"; }
        }
    </script>
</body>
</html>
