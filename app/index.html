<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LUDIK AI</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --neon: #bc13fe;
            --gold: linear-gradient(180deg,#ffe57e 0%,#d4af37 40%,#b8860b 100%);
        }
        * { box-sizing: border-box; margin:0; padding:0; -webkit-tap-highlight-color: transparent;}
        html, body {height:100%; width:100%; overflow:hidden; background: var(--bg); font-family: 'Inter', sans-serif; color:white; position: relative;}
        body {display:flex; flex-direction:column; align-items:center; padding:20px;}
        
        .app-title {font-family:'Orbitron', sans-serif; font-size:20px; background: var(--gold); -webkit-background-clip:text; -webkit-text-fill-color:transparent; text-transform:uppercase; margin:10px 0 20px; text-shadow:0 0 15px rgba(188,19,254,0.6);}
        
        .main-card {width:100%; max-width:420px; background:rgba(15,15,15,0.98); border:2px solid var(--neon); border-radius:30px; padding:20px; box-shadow:0 0 20px var(--neon); z-index:10; position:relative;}
        
        .menu-grid {display:grid; grid-template-columns:1fr 1fr; gap:12px;}
        .menu-item {background:#111; border:2px solid var(--neon); border-radius:25px; padding:25px 10px; text-align:center; cursor:pointer; display:flex; flex-direction:column; align-items:center; justify-content:center; transition: all 0.3s ease;}
        .menu-item:active {transform:scale(0.95); background:#222;}
        
        .gold-icon {font-size:28px; display:block; margin-bottom:5px;}
        .item-label {font-size:11px; color:#f3cf7a; text-transform:uppercase; font-weight:900;}

        /* Попапы */
        .overlay {display:none; position:fixed; inset:0; background:rgba(0,0,0,0.95); z-index:900;}
        .popup {display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); width:90%; max-width:380px; background:#0a0a0a; border:2px solid #d4af37; border-radius:25px; padding:20px; z-index:1000; text-align:center; max-height:80%; overflow-y:auto;}
        
        .close-btn {background:#222; color:#888; padding:12px; width:100%; border-radius:15px; margin-top:15px; border:1px solid #444; font-weight:bold;}
        .action-btn {background:var(--gold); color:black; padding:14px; width:100%; border-radius:15px; margin-top:10px; border:none; font-weight:900; cursor:pointer; text-decoration: none; display: block;}
        
        .league-grid {display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:10px;}
        .league-btn {background:#1a1a1a; color:white; border:1px solid #333; padding:10px; border-radius:12px; font-size:11px;}
        
        table {width:100%; border-collapse:collapse; margin-top:10px;}
        th, td {border:1px solid #444; padding:8px; font-size:11px;}
    </style>
</head>
<body>

<div class="app-title">LUDIK AI</div>

<div class="main-card">
    <div class="menu-grid">
        <div class="menu-item" onclick="openPredict()"><span class="gold-icon">⚽️</span><span class="item-label">ПРОГНОЗЫ</span></div>
        <div class="menu-item" onclick="openP('vipP')"><span class="gold-icon">💎</span><span class="item-label">VIP ДОСТУП</span></div>
        <div class="menu-item" onclick="openP('profileP')"><span class="gold-icon">👤</span><span class="item-label">ПРОФИЛЬ</span></div>
        <div class="menu-item" onclick="openP('bonusP')"><span class="gold-icon">🎁</span><span class="item-label">БОНУСЫ</span></div>
        <div class="menu-item" onclick="openP('refP')"><span class="gold-icon">🔗</span><span class="item-label">РЕФЕРАЛ</span></div>
        <div class="menu-item" onclick="openP('statsP')"><span class="gold-icon">📊</span><span class="item-label">СТАТИСТИКА</span></div><div class="menu-item" onclick="openBattle()"><span class="gold-icon">⚔️</span><span class="item-label">БИТВА ЛУДИКОВ</span></div>
        <div class="menu-item" onclick="openP('jbP')"><span class="gold-icon">🔥</span><span class="item-label">ЖБ ДНЯ</span></div>
        <div class="menu-item" onclick="openHistory()"><span class="gold-icon">📜</span><span class="item-label">ИСТОРИЯ</span></div>
        <div class="menu-item" onclick="openP('chatP')"><span class="gold-icon">💬</span><span class="item-label">ЧАТ</span></div>
    </div>
</div>

<div class="overlay" id="overlay" onclick="closeAll()"></div>

<div id="predictP" class="popup">
    <h3 style="color:#ffe57e">ВЫБЕРИ ЛИГУ</h3>
    <div class="league-grid" id="leagueBox"></div>
    <div id="pRes" style="margin-top:15px; font-size:13px;"></div>
    <button class="close-btn" onclick="closeAll()">ЗАКРЫТЬ</button>
</div>

<div id="historyP" class="popup">
    <h2 style="color:#bc13fe">ИСТОРИЯ</h2>
    <table id="historyTable">
        <thead><tr><th>Время</th><th>Матч</th><th>Прогноз</th></tr></thead>
        <tbody></tbody>
    </table>
    <button class="close-btn" onclick="closeAll()">ЗАКРЫТЬ</button>
</div>

<div id="battleP" class="popup">
    <h2 style="color:#bc13fe">БИТВА</h2>
    <p id="battleMatch" style="margin:10px 0; font-size:14px;">Загрузка...</p>
    <div id="battleBox"></div>
    <button class="close-btn" onclick="closeAll()">ЗАКРЫТЬ</button>
</div>

<div id="refP" class="popup">
    <h2>ВАША ССЫЛКА</h2>
    <p id="refLink" style="font-size:11px; background:#111; padding:10px; margin:10px 0; word-break:break-all;"></p>
    <button class="action-btn" onclick="copyRef()">КОПИРОВАТЬ</button>
    <button class="close-btn" onclick="closeAll()">ЗАКРЫТЬ</button>
</div>

<div id="vipP" class="popup"><h2>VIP</h2><button class="close-btn" onclick="closeAll()">ЗАКРЫТЬ</button></div>
<div id="profileP" class="popup"><h2>ПРОФИЛЬ</h2><button class="close-btn" onclick="closeAll()">ЗАКРЫТЬ</button></div>
<div id="bonusP" class="popup"><h2>БОНУСЫ</h2><button class="close-btn" onclick="closeAll()">ЗАКРЫТЬ</button></div>
<div id="statsP" class="popup"><h2>СТАТИСТИКА</h2><button class="close-btn" onclick="closeAll()">ЗАКРЫТЬ</button></div>
<div id="jbP" class="popup"><h2>ЖБ ДНЯ</h2><button class="close-btn" onclick="closeAll()">ЗАКРЫТЬ</button></div>
<div id="chatP" class="popup"><h2>ЧАТ</h2><button class="close-btn" onclick="closeAll()">ЗАКРЫТЬ</button></div>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    const SERVER_URL = "http://localhost:3000";

    // Управление окнами
    function openP(id) {
        closeAll();
        document.getElementById('overlay').style.display = 'block';
        document.getElementById(id).style.display = 'block';
    }

    function closeAll() {
        document.getElementById('overlay').style.display = 'none';
        document.querySelectorAll('.popup').forEach(p => p.style.display = 'none');
    }

    // Прогнозы
    function openPredict() {
        openP('predictP');
        const box = document.getElementById('leagueBox');
        box.innerHTML = "";
        const leagues = {"PL":"АПЛ","PD":"Ла Лига","BL1":"Бундеслига","SA":"Серия А","CL":"ЛЧ"};
        
        Object.keys(leagues).forEach(code => {
            const btn = document.createElement('button');
            btn.className = "league-btn";
            btn.innerText = leagues[code];
            btn.onclick = () => getPredict(code);
            box.appendChild(btn);
        });
    }

    async function getPredict(code) {
        const resBox = document.getElementById('pRes');
        resBox.innerHTML = "Анализ...";
        try {
            const r = await fetch(SERVER_URL + "/predict?league=" + code);
            const d = await r.json();
            resBox.innerHTML = "<b>" + d.home + " vs " + d.away + "</b><br>Прогноз: " + d.forecast + "<br><small>" + d.ai_logic + "</small>";
        } catch(e) { resBox.innerText = "Ошибка сервера"; }
    }

    // История
    async function openHistory() {
        openP('historyP');const tbody = document.querySelector('#historyTable tbody');
        tbody.innerHTML = "<tr><td colspan='3'>Загрузка...</td></tr>";
        try {
            const r = await fetch(SERVER_URL + "/history");
            const d = await r.json();
            tbody.innerHTML = d.map(h => "<tr><td>"+h.date+"</td><td>"+h.match+"</td><td>"+h.forecast+"</td></tr>").join('');
        } catch(e) { tbody.innerHTML = "Ошибка"; }
    }

    // Битва
    async function openBattle() {
        openP('battleP');
        try {
            const r = await fetch(SERVER_URL + "/battle");
            const d = await r.json();
            document.getElementById('battleMatch').innerText = d.matchName;
            const box = document.getElementById('battleBox');
            box.innerHTML = "";
            [d.homeTeam, "Ничья", d.awayTeam].forEach(t => {
                const btn = document.createElement('button');
                btn.className = "action-btn";
                btn.innerText = t;
                btn.onclick = () => tg.showAlert("Ставка принята!");
                box.appendChild(btn);
            });
        } catch(e) { }
    }

    // Реферал
    function copyRef() {
        const link = "https://t.me/YourBot?start=" + (tg.initDataUnsafe.user?.id || "000");
        document.getElementById('refLink').innerText = link;
        const el = document.createElement('textarea');
        el.value = link;
        document.body.appendChild(el);
        el.select();
        document.execCommand('copy');
        document.body.removeChild(el);
        tg.showAlert("Ссылка скопирована!");
    }
</script>

</body>
</html>
