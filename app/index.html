<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>LUDIK AI</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

<style>
:root {
    --bg: #050505;
    --neon: #bc13fe;
    --gold: linear-gradient(180deg,#ffe57e 0%,#d4af37 40%,#b8860b 100%);
}

* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    -webkit-tap-highlight-color: transparent;
}

html, body {
    height: 100%;
    width: 100%;
    background: var(--bg);
    font-family: 'Inter', sans-serif;
    color: white;
}

body {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
}

.app-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 18px;
    background: var(--gold);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin: 15px 0 20px;
    text-transform: uppercase;
}

.main-card {
    width: 100%;
    max-width: 400px;
    background: rgba(15,15,15,0.98);
    border: 2px solid var(--neon);
    border-radius: 30px;
    padding: 20px;
}

.menu-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
}

.menu-item {
    background: #111;
    border: 2px solid rgba(212,175,55,0.3);
    border-radius: 20px;
    padding: 25px 10px;
    text-align: center;
    cursor: pointer;
    transition: 0.2s;
}

.menu-item:active {
    background: #222;
    border-color: var(--neon);
    transform: scale(0.97);
}

.gold-icon {
    font-size: 28px;
    display: block;
    margin-bottom: 8px;
}

.item-label {
    font-size: 12px;
    color: #f3cf7a;
    text-transform: uppercase;
    font-weight: 900;
}

/* POPUPS */

.overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.95);
    z-index: 1000;
}

.popup {
    display: none;
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 85%;
    max-width: 380px;
    background: #0a0a0a;
    border: 2px solid #d4af37;
    border-radius: 25px;
    padding: 25px;
    z-index: 1001;
    text-align: center;
}

.close-btn {
    background: #222;
    color: white;
    padding: 15px;
    width: 100%;
    border-radius: 15px;
    margin-top: 15px;
    border: 1px solid #444;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="app-title">LUDIK AI</div>

<div class="main-card">
    <div class="menu-grid">
        <div class="menu-item" data-code="PL">
            <span class="gold-icon">🏴</span>
            <span class="item-label">АПЛ</span>
        </div>
        <div class="menu-item" data-code="PD">
            <span class="gold-icon">🇪🇸</span>
            <span class="item-label">Ла Лига</span>
        </div>
        <div class="menu-item" data-code="BL1">
            <span class="gold-icon">🇩🇪</span>
            <span class="item-label">Бундес</span>
        </div>
        <div class="menu-item" data-code="SA">
            <span class="gold-icon">🇮🇹</span>
            <span class="item-label">Серия А</span>
        </div>
        <div class="menu-item" id="profileBtn">
            <span class="gold-icon">👤</span>
            <span class="item-label">ПРОФИЛЬ</span>
        </div>
        <div class="menu-item" id="bonusBtn">
            <span class="gold-icon">🎁</span>
            <span class="item-label">БОНУСЫ</span>
        </div>
    </div>
</div>

<div class="overlay" id="overlay"></div>

<div id="predictP" class="popup">
    <h2 id="pTitle">АНАЛИЗ...</h2>
    <div id="pStats"></div>
    <button class="close-btn">ЗАКРЫТЬ</button>
</div>

<div id="profileP" class="popup">
    <h2>ПРОФИЛЬ</h2>
    <p>Баланс: 100 LC</p>
    <button class="close-btn">ЗАКРЫТЬ</button>
</div>

<div id="bonusP" class="popup">
    <h2>БОНУСЫ</h2>
    <p>Подпишись на канал!</p>
    <button class="close-btn">ЗАКРЫТЬ</button>
</div>

<script>
const tg = window.Telegram.WebApp;

tg.ready();tg.expand();

const overlay = document.getElementById('overlay');
const popups = document.querySelectorAll('.popup');

function openPopup(id){
    overlay.style.display = 'block';
    document.getElementById(id).style.display = 'block';
}

function closeAll(){
    overlay.style.display = 'none';
    popups.forEach(p => p.style.display = 'none');
}

document.querySelectorAll('.close-btn').forEach(btn=>{
    btn.addEventListener('click', closeAll);
});

overlay.addEventListener('click', closeAll);

document.getElementById('profileBtn').addEventListener('click', ()=>{
    openPopup('profileP');
});

document.getElementById('bonusBtn').addEventListener('click', ()=>{
    openPopup('bonusP');
});

document.querySelectorAll('[data-code]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
        apiFetch(btn.dataset.code);
    });
});

async function apiFetch(code){
    openPopup('predictP');
    document.getElementById('pTitle').innerText = "АНАЛИЗ...";
    document.getElementById('pStats').innerText = "";

    try{
        const res = await fetch(`https://api.football-data.org/v4/competitions/${code}/matches?status=SCHEDULED`,{
            headers:{ 'X-Auth-Token':'7a5d573e9f134d42b4edaa35c408e019' }
        });

        const data = await res.json();

        if(data.matches && data.matches.length > 0){
            const m = data.matches[0];
            document.getElementById('pTitle').innerText =
                m.homeTeam.name + " - " + m.awayTeam.name;
            document.getElementById('pStats').innerText = "АНАЛИЗ ГОТОВ";
        } else {
            document.getElementById('pTitle').innerText = "МАТЧЕЙ НЕТ";
        }

    } catch(e){
        document.getElementById('pTitle').innerText = "ОШИБКА";
    }
}
</script>

</body>
</html>
