<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LUDIK AI PREDICTOR</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #050505; 
            --neon: #bc13fe; 
            --gold: linear-gradient(180deg, #ffe57e 0%, #d4af37 40%, #b8860b 100%); 
        }
        
        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            margin: 0; padding: 0; 
            touch-action: manipulation; 
        }
        
        html, body { 
            height: 100vh; 
            width: 100vw; 
            overflow: hidden; 
            background-color: var(--bg); 
            position: fixed;
        }

        body { 
            color: white; 
            font-family: 'Inter', sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 15px;
        }

        .app-title { 
            font-family: 'Orbitron', sans-serif; 
            font-size: 18px; 
            background: var(--gold); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
            margin: 15px 0; 
            text-transform: uppercase; 
            letter-spacing: 1px;
        }

        .main-card { 
            width: 100%; 
            max-width: 400px; 
            background: rgba(15,15,15,0.98); 
            border: 2px solid var(--neon); 
            border-radius: 30px; 
            padding: 20px; 
            box-shadow: 0 0 20px rgba(188, 19, 254, 0.2); 
        }

        .balance-box { 
            text-align: center; 
            margin-bottom: 20px; 
            border-bottom: 1px solid rgba(255,255,255,0.1); 
            padding-bottom: 15px; 
        }

        .balance-amount { 
            font-size: 36px; 
            font-weight: 900; 
            background: var(--gold); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
        }

        .menu-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 12px; 
            width: 100%;
        }

        .menu-item { 
            background: #111; 
            border: 1px solid rgba(212, 175, 55, 0.2); 
            border-radius: 20px; 
            padding: 15px; 
            text-align: center; 
            cursor: pointer; 
            transition: transform 0.1s;
        }

        .menu-item:active { transform: scale(0.95); }

        .gold-icon { font-size: 24px; display: block; margin-bottom: 5px; }
        .item-label { 
            font-size: 10px; 
            color: #f3cf7a; 
            text-transform: uppercase; 
            font-weight: 800; 
        }

        /* Окна (Попапы) */
        .overlay { 
            display: none; 
            position: fixed; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            background: rgba(0,0,0,0.9); 
            z-index: 99; 
        }

        .popup { 
            display: none; 
            position: fixed; 
            top: 50%; left: 50%; 
            transform: translate(-50%, -50%); 
            width: 85%; 
            background: #0a0a0a; 
            border: 2px solid #d4af37; 
            border-radius: 25px; 
            padding: 25px; 
            z-index: 100; 
            text-align: center; 
        }

        .row { 
            display: flex; 
            justify-content: space-between; 
            margin-bottom: 12px; 
            font-size: 13px; 
            border-bottom: 1px solid #222; 
            padding-bottom: 6px; 
            text-align: left; 
        }

        .gold-t { color: #d4af37; font-weight: bold; }
        
        .btn-link {<div class="row"><span>Ваш баланс:</span><span class="gold-t" id="profBal">100.00 LC</span></div>
        <button class="btn-link" onclick="dailyBonus()" id="dailyBtn">🎁 ПОЛУЧИТЬ БОНУС 50 LC</button>
        <button class="close-btn" onclick="closeAll()">ЗАКРЫТЬ</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        tg.setHeaderColor('#050505');

        let balance = 100.00;
        const API_KEY = '7a5d573e9f134d42b4edaa35c408e019';

        async function apiFetch(code) {
            openP('predictP');
            document.getElementById('pTitle').innerText = "АНАЛИЗИРУЕМ МАТЧИ...";
            document.getElementById('pStats').innerHTML = '<div style="color:#d4af37; padding:20px;">ПОДКЛЮЧЕНИЕ К СЕРВЕРУ...</div>';

            try {
                const response = await fetch(`https://api.football-data.org/v4/competitions/${code}/matches?status=SCHEDULED`, {
                    headers: { 'X-Auth-Token': API_KEY }
                });
                const data = await response.json();
                
                if (!data.matches || data.matches.length === 0) {
                    document.getElementById('pTitle').innerText = "МАТЧЕЙ НЕ НАЙДЕНО";
                    document.getElementById('pStats').innerText = "На сегодня все игры завершены.";
                    return;
                }

                const m = data.matches[0];
                const winner = Math.random() > 0.5 ? m.homeTeam.name : m.awayTeam.name;

                document.getElementById('pTitle').innerText = ${m.homeTeam.name} VS ${m.awayTeam.name};
                document.getElementById('pStats').innerHTML = `
                    <div class="row"><span>РЕКОМЕНДАЦИЯ:</span><span class="gold-t">Победа ${winner}</span></div>
                    <div class="row"><span>КОЭФФИЦИЕНТ:</span><span class="gold-t">${(Math.random()*(1.8-1.3)+1.3).toFixed(2)}</span></div>
                    <div class="row"><span>ВЕРОЯТНОСТЬ:</span><span style="color:#00ff00;">${Math.floor(Math.random()*(88-75)+75)}%</span></div>
                    <p style="font-size:10px; color:#555; margin-top:10px;">Начало: ${new Date(m.utcDate).toLocaleString()}</p>
                `;
            } catch (e) {
                document.getElementById('pTitle').innerText = "ОШИБКА API";
                document.getElementById('pStats').innerText = "Превышен лимит запросов. Попробуйте позже.";
            }
        }

        function dailyBonus() {
            balance += 50.00;
            updateBalance();
            document.getElementById('dailyBtn').innerText = "БОНУС ПОЛУЧЕН";
            document.getElementById('dailyBtn').style.opacity = "0.5";
            document.getElementById('dailyBtn').onclick = null;
        }

        function updateBalance() {
            document.getElementById('userBalance').innerText = balance.toFixed(2);
            document.getElementById('profBal').innerText = balance.toFixed(2) + " LC";
        }

        function openP(id) {
            document.getElementById('overlay').style.display = 'block';
            document.getElementById(id).style.display = 'block';
        }

        function closeAll() {
            document.getElementById('overlay').style.display = 'none';
            const popups = document.querySelectorAll('.popup');
            popups.forEach(p => p.style.display = 'none');
        }

        // Принудительный разворот при клике
        document.body.addEventListener('click', () => {
            if (!tg.isExpanded) tg.expand();
        });
    </script>
</body>
</html>
