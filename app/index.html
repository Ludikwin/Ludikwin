<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>LUDIK AI</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

<style>
:root {
    --bg: #050505;
    --neon: #bc13fe;
    --gold: linear-gradient(180deg,#ffe57e 0%,#d4af37 40%,#b8860b 100%);
}

* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    -webkit-tap-highlight-color: transparent;
}

html, body {
    height: 100%;
    width: 100%;
    background: var(--bg);
    font-family: 'Inter', sans-serif;
    color: white;
}

body {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
}

.app-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 20px;
    background: var(--gold);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin: 10px 0 20px;
    text-transform: uppercase;
    text-align: center;
}

.main-card {
    width: 100%;
    max-width: 400px;
    background: rgba(15,15,15,0.98);
    border: 2px solid var(--neon);
    border-radius: 30px;
    padding: 20px;
}

.menu-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
}

.menu-item {
    background: #111;
    border: 2px solid rgba(212,175,55,0.3);
    border-radius: 20px;
    padding: 20px 10px;
    text-align: center;
    cursor: pointer;
    transition: 0.2s;
}

.menu-item:active {
    background: #222;
    border-color: var(--neon);
    transform: scale(0.97);
}

.gold-icon {
    font-size: 28px;
    display: block;
    margin-bottom: 8px;
}

.item-label {
    font-size: 12px;
    color: #f3cf7a;
    text-transform: uppercase;
    font-weight: 900;
}

/* POPUPS */
.overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.95);
    z-index: 1000;
}

.popup {
    display: none;
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 90%;
    max-width: 400px;
    background: #0a0a0a;
    border: 2px solid #d4af37;
    border-radius: 25px;
    padding: 25px;
    z-index: 1001;
    text-align: center;
    color: #fff;
}

.popup h2 {
    margin-bottom: 15px;
}

.close-btn {
    background: #222;
    color: white;
    padding: 12px;
    width: 100%;
    border-radius: 15px;
    margin-top: 15px;
    border: 1px solid #444;
    cursor: pointer;
}
</style>
</head>
<body>

<div class="app-title">LUDIK AI</div>

<div class="main-card">
    <div class="menu-grid">
        <div class="menu-item" id="prognosesBtn"><span class="gold-icon">⚽️</span><span class="item-label">Прогнозы</span></div>
        <div class="menu-item" id="jbBtn"><span class="gold-icon">🔥</span><span class="item-label">ЖБ ДНЯ</span></div>
        <div class="menu-item" id="vipBtn"><span class="gold-icon">💎</span><span class="item-label">VIP</span></div>
        <div class="menu-item" id="refBtn"><span class="gold-icon">👥</span><span class="item-label">Рефералка</span></div>
        <div class="menu-item" id="bonusBtn"><span class="gold-icon">🎁</span><span class="item-label">Бонусы</span></div>
        <div class="menu-item" id="statsBtn"><span class="gold-icon">📈</span><span class="item-label">Статистика</span></div>
    </div>
</div>

<div class="overlay" id="overlay"></div>

<div id="popupPredict" class="popup">
    <h2 id="predictTitle">АНАЛИЗ...</h2>
    <div id="predictContent"></div>
    <button class="close-btn">ЗАКРЫТЬ</button>
</div>

<div id="popupProfile" class="popup">
    <h2>ПРОФИЛЬ</h2>
    <p id="profileContent">Баланс: 100 LC<br>VIP: Не активен</p>
    <button class="close-btn">ЗАКРЫТЬ</button>
</div>

<div id="popupBonus" class="popup">
    <h2>БОНУСЫ</h2>
    <div>
        <p>📢 Подпишись на канал (+100 LC)</p>
        <p>💬 Чат (+50 LC)</p>
        <p>🚀 1WIN БОНУС 500%</p>
        <p>🔥 STAKE БОНУС</p>
    </div>
    <button class="close-btn">ЗАКРЫТЬ</button>
</div><script>
const tg = window.Telegram.WebApp;
tg.ready();
tg.expand();

// ====================
// Popup Handling
// ====================
const overlay = document.getElementById('overlay');
const popups = document.querySelectorAll('.popup');

function openPopup(id){
    overlay.style.display = 'block';
    document.getElementById(id).style.display = 'block';
}

function closeAll(){
    overlay.style.display = 'none';
    popups.forEach(p => p.style.display = 'none');
}

document.querySelectorAll('.close-btn').forEach(btn=>{
    btn.addEventListener('click', closeAll);
});
overlay.addEventListener('click', closeAll);

// ====================
// Menu Buttons
// ====================
document.getElementById('prognosesBtn').addEventListener('click', async ()=>{
    openPopup('popupPredict');
    document.getElementById('predictTitle').innerText = "Загрузка прогнозов...";
    document.getElementById('predictContent').innerHTML = "";

    const LEAGUES = {
        "PL":"🏴 Англия",
        "PD":"🇪🇸 Испания",
        "BL1":"🇩🇪 Германия",
        "SA":"🇮🇹 Италия",
        "CL":"🏆 Лига Чемпионов"
    };

    let html = "";
    for(const code in LEAGUES){
        try{
            const res = await fetch(`https://api.football-data.org/v4/competitions/${code}/matches?status=SCHEDULED`,{
                headers:{'X-Auth-Token':'7a5d573e9f134d42b4edaa35c408e019'}
            });
            const data = await res.json();
            if(data.matches && data.matches.length>0){
                const m = data.matches[0];
                const scoreH = Math.floor(Math.random()*4);
                const scoreA = Math.floor(Math.random()*4);
                const total = scoreH+scoreA > 2.5 ? "2.5 Б":"2.5 М";
                html += `<p><b>${LEAGUES[code]}:</b> ${m.homeTeam.name} - ${m.awayTeam.name}<br>
                Счёт: ${scoreH}:${scoreA}, Тотал: ${total}</p>`;
            } else {
                html += <p><b>${LEAGUES[code]}:</b> Нет матчей</p>;
            }
        } catch(e){
            html += <p><b>${LEAGUES[code]}:</b> Ошибка</p>;
        }
    }
    document.getElementById('predictTitle').innerText = "Прогнозы AI";
    document.getElementById('predictContent').innerHTML = html;
});

document.getElementById('jbBtn').addEventListener('click', async ()=>{
    openPopup('popupPredict');
    document.getElementById('predictTitle').innerText = "ЖБ ДНЯ...";
    document.getElementById('predictContent').innerHTML = "";
    try{
        const res = await fetch(`https://api.football-data.org/v4/competitions/PL/matches?status=SCHEDULED`,{
            headers:{'X-Auth-Token':'7a5d573e9f134d42b4edaa35c408e019'}
        });
        const data = await res.json();
        if(data.matches && data.matches.length>0){
            const m = data.matches[0];
            const scoreH = Math.floor(Math.random()*3)+1; 
            const scoreA = Math.floor(Math.random()*2); 
            const total = scoreH+scoreA>2.5?"2.5 Б":"2.5 М";
            document.getElementById('predictTitle').innerText = "ЖБ ДНЯ";
            document.getElementById('predictContent').innerHTML = `<p><b>${m.homeTeam.name} - ${m.awayTeam.name}</b><br>
            Счёт: ${scoreH}:${scoreA}, Тотал: ${total}</p>`;
        } else {
            document.getElementById('predictTitle').innerText = "ЖБ ДНЯ";
            document.getElementById('predictContent').innerHTML = "Нет матчей";
        }
    }catch(e){
        document.getElementById('predictContent').innerText = "Ошибка API";
    }
});

document.getElementById('vipBtn').addEventListener('click', ()=>{
    openPopup('popupPredict');
    document.getElementById('predictTitle').innerText = "VIP Доступ";
    document.getElementById('predictContent').innerHTML = "<p>💎 Точность прогнозов выше, доступ к скрытым матчам и VIP аналитике</p>";
});

document.getElementById('refBtn').addEventListener('click', ()=>{
    openPopup('popupProfile');
});

document.getElementById('statsBtn').addEventListener('click', ()=>{
    openPopup('popupProfile');
});

document.getElementById('bonusBtn').addEventListener('click', ()=>{openPopup('popupBonus');
});
</script>

</body>
</html>
