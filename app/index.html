<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>LUDIK AI</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

<style>
:root {
    --bg: #07070b;
    --gold: #d4af37;
    --gold-soft: rgba(212,175,55,0.4);
    --violet: #8a2be2;
    --glass: rgba(255,255,255,0.04);
    --border-gold: rgba(212,175,55,0.25);
}

* { box-sizing: border-box; margin:0; padding:0; -webkit-tap-highlight-color: transparent;}

html, body {
    height:100%;
    width:100%;
    overflow:hidden;
    background: radial-gradient(circle at top, #111 0%, #07070b 60%);
    font-family: 'Inter', sans-serif;
    color:white;
}

body {display:flex; flex-direction:column; align-items:center; padding:20px;}

/* === TITLE === */
.app-title {
    font-family:'Orbitron', sans-serif;
    font-size:22px;
    font-weight:700;
    background: linear-gradient(180deg,#fff6c3 0%,#d4af37 40%,#a57c00 100%);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    text-transform:uppercase;
    margin:15px 0 25px;
    letter-spacing:2px;
    text-shadow:0 0 25px var(--gold-soft);
}

/* === MAIN CARD === */
.main-card {
    width:100%;
    max-width:420px;
    backdrop-filter: blur(20px);
    background: var(--glass);
    border:1px solid var(--border-gold);
    border-radius:28px;
    padding:22px;
    box-shadow:
        0 0 40px rgba(138,43,226,0.15),
        inset 0 0 25px rgba(212,175,55,0.05);
}

/* === MENU GRID === */
.menu-grid {
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:14px;
}

.menu-item {
    background: rgba(15,15,15,0.8);
    border:1px solid rgba(212,175,55,0.2);
    border-radius:22px;
    padding:28px 10px;
    text-align:center;
    cursor:pointer;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    transition: all 0.3s ease;
    position:relative;
}

.menu-item:hover {
    transform: translateY(-3px);
    box-shadow:0 0 20px rgba(212,175,55,0.4), 0 0 40px rgba(138,43,226,0.2);
    border-color: var(--gold);
}

.menu-item:active { transform: scale(0.95); }

.gold-icon { font-size:26px; margin-bottom:6px; }
.item-label { font-size:11px; color: var(--gold); font-weight:800; letter-spacing:1px; }

/* === OVERLAY === */
.overlay {
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.92);
    backdrop-filter: blur(8px);
    z-index:900;
}

/* === POPUP === */
.popup {
    display:none;
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%, -50%) scale(0.9);
    width:90%;
    max-width:380px;
    backdrop-filter: blur(25px);
    background: rgba(10,10,15,0.95);
    border:1px solid var(--border-gold);
    border-radius:24px;
    padding:22px;
    z-index:1000;
    text-align:center;
    max-height:80%;
    overflow-y:auto;
    opacity:0;
    transition: all 0.3s ease;
}

.popup.open { transform:translate(-50%, -50%) scale(1); opacity:1; }

/* === BUTTONS === */
.action-btn {
    background: linear-gradient(135deg,#f8e7a1,#d4af37,#b8860b);
    color:black;
    padding:14px;
    width:100%;
    border-radius:16px;
    margin-top:12px;
    border:none;
    font-weight:900;
    text-decoration:none;
    box-shadow:0 0 25px var(--gold-soft);
    transition: all 0.3s ease;
}
.action-btn:hover { transform: translateY(-2px); box-shadow:0 0 35px var(--gold); }

.close-btn {
    background: rgba(255,255,255,0.05);
    color:#aaa;
    padding:12px;
    width:100%;
    border-radius:14px;
    margin-top:15px;
    border:1px solid rgba(255,255,255,0.1);
    font-weight:bold;
    transition: all 0.2s;
}
.close-btn:hover { background: rgba(255,255,255,0.1); color:white; }

/* === TABLE === */
table { width:100%; border-collapse:collapse; margin-top:10px; }
th, td { border:1px solid rgba(212,175,55,0.2); padding:8px; font-size:12px; text-align:center; }
th { background: rgba(212,175,55,0.1); }

/* === STAT ROW === */
.stat-row { display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px solid rgba(255,255,255,0.05); font-size:14px; }
.gold-t { color: var(--gold); font-weight:bold; }

/* === LEAGUE BUTTON === */
.league-btn {
    background: rgba(20,20,20,0.8);
    color:white;
    border:1px solid rgba(212,175,55,0.2);
    padding:10px;
    border-radius:14px;
    font-size:11px;
    cursor:pointer;
    transition: all 0.2s;
}
.league-btn:hover { border-color: var(--gold); box-shadow:0 0 15px var(--gold-soft); }

</style>
</head>

<body ontouchstart="tg.expand()">

<!-- === Твой HTML остаётся без изменений === -->
<!-- Просто подключаем новые классы и новый стиль -->

<div class="app-title">LUDIK AI</div>

<div class="main-card">
    <div class="menu-grid">
        <div class="menu-item" onclick="openPredict()"><span class="gold-icon">⚽️</span><span class="item-label">ПРОГНОЗЫ</span></div>
        <div class="menu-item" onclick="openP('vipP')"><span class="gold-icon">💎</span><span class="item-label">VIP ДОСТУП</span></div>
        <div class="menu-item" onclick="openP('profileP')"><span class="gold-icon">👤</span><span class="item-label">ПРОФИЛЬ</span></div>
        <div class="menu-item" onclick="openP('bonusP')"><span class="gold-icon">🎁</span><span class="item-label">БОНУСЫ</span></div>
        <div class="menu-item" onclick="openP('refP')"><span class="gold-icon">🔗</span><span class="item-label">РЕФЕРАЛ</span></div>
        <div class="menu-item" onclick="openP('statsP')"><span class="gold-icon">📊</span><span class="item-label">СТАТИСТИКА</span></div>
        <div class="menu-item" onclick="openP('battleP')"><span class="gold-icon">⚔️</span><span class="item-label">БИТВА ЛУДИКОВ</span></div>
        <div class="menu-item" onclick="openP('jbP')"><span class="gold-icon">🔥</span><span class="item-label">ЖБ ДНЯ</span></div>
        <div class="menu-item" onclick="openP('historyP')"><span class="gold-icon">📜</span><span class="item-label">ИСТОРИЯ ПРОГНОЗОВ</span></div>
        <div class="menu-item" onclick="openP('chatP')"><span class="gold-icon">💬</span><span class="item-label">ЧАТ</span></div>
    </div>
</div>

<div class="overlay" id="overlay" onclick="closeAll()"></div>

<!-- === Твой JS и popups остаются полностью без изменений === -->
<script>
const tg = window.Telegram.WebApp;
tg.ready();
tg.expand();

const user = tg.initDataUnsafe?.user;
if(user){
    document.getElementById('uID').innerText = user.id;
    document.getElementById('refLink').innerText = 'https://t.me/LudikWin_bot?start='+user.id;
}

function openP(id){
    closeAll();
    document.getElementById('overlay').style.display='block';
    const popup=document.getElementById(id);
    popup.style.display='block';
    popup.classList.add('open');
    tg.expand();
}

function closeAll(){
    document.getElementById('overlay').style.display='none';
    document.querySelectorAll('.popup').forEach(p=>{
        p.style.display='none';
        p.classList.remove('open');
    });
}

function openPredict(){
    openP('predictP');
    const box=document.getElementById('leagueBox');
    box.innerHTML="";
    const leagues={"PL":"АПЛ","PD":"Ла Лига","BL1":"Бундес","SA":"Серия А","CL":"ЛЧ","RPL":"РПЛ","MLS":"MLS","EL":"ЛЕ"};
    Object.keys(leagues).forEach(code=>{
        const btn=document.createElement('button');
        btn.className="league-btn";
        btn.innerText=leagues[code];
        btn.onclick=()=>getPredict(code);
        box.appendChild(btn);
    });
}

async function getPredict(code){
    const resBox=document.getElementById('pRes');
    resBox.innerText="АНАЛИЗ...";
    try{
        const res=await fetch(`https://api.football-data.org/v4/competitions/${code}/matches?status=SCHEDULED`,{
            headers:{'X-Auth-Token':'7a5d573e9f134d42b4edaa35c408e019'}
        });
        const data=await res.json();
        if(data.matches && data.matches.length>0){
            const m=data.matches[0];
            resBox.innerHTML=m.homeTeam.name+' vs '+m.awayTeam.name+'<br><span style="color:#ffe57e">Прогноз: ТБ 2.5</span>';
        } else {resBox.innerText="Матчей нет";}
    }catch(e){resBox.innerText="Ошибка API";}
}

function copyRef(){
    const link=document.getElementById('refLink').innerText;
    const el=document.createElement('textarea');
    el.value=link;
    document.body.appendChild(el);
    el.select();
    document.execCommand('copy');
    document.body.removeChild(el);
    tg.showAlert("Скопировано!");
}

// БИТВА ЛУДИКОВ
function generateBattle(){
    const box=document.getElementById('battleBox');
    box.innerHTML="";
    const options=['Победа К1','Ничья','Победа К2'];
    options.forEach(o=>{
        const b=document.createElement('button');
        b.className='action-btn';
        b.innerText=o;
        b.onclick=()=>tg.showAlert('Вы выбрали: '+o);
        box.appendChild(b);
    });
}
generateBattle();
</script>

</body>
</html>
