<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>LUDIK AI</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

<style>
:root {
    --bg: #050505;
    --neon: #bc13fe;
    --gold: linear-gradient(180deg,#ffe57e 0%,#d4af37 40%,#b8860b 100%);
}

* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

html, body {
    height: 100%;
    background: var(--bg);
    font-family: 'Inter', sans-serif;
    color: white;
}

body {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
}

.app-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 20px;
    background: var(--gold);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin: 15px 0 20px;
    text-transform: uppercase;
}

.main-card {
    width: 100%;
    max-width: 420px;
    background: rgba(15,15,15,0.98);
    border: 2px solid var(--neon);
    border-radius: 30px;
    padding: 20px;
    box-shadow: 0 0 20px var(--neon);
}

.menu-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
}

.menu-item {
    background: #111;
    border: 2px solid var(--neon);
    border-radius: 25px;
    padding: 25px 10px;
    text-align: center;
    cursor: pointer;
    transition: 0.2s;
    box-shadow: 0 0 15px var(--neon);
}

.menu-item:active {
    background: #222;
    border-color: #ffe57e;
    transform: scale(0.97);
}

.gold-icon {
    font-size: 28px;
    display: block;
    margin-bottom: 8px;
}

.item-label {
    font-size: 12px;
    color: #f3cf7a;
    text-transform: uppercase;
    font-weight: 900;
}
</style>
</head>

<body>

<div class="app-title">LUDIK AI</div>

<div class="main-card">
    <div class="menu-grid">

        <!-- Топ лиги -->
        <div class="menu-item" onclick="openLeague('PL')">
            <span class="gold-icon">🏴</span>
            <span class="item-label">АПЛ</span>
        </div>

        <div class="menu-item" onclick="openLeague('PD')">
            <span class="gold-icon">🇪🇸</span>
            <span class="item-label">Ла Лига</span>
        </div>

        <div class="menu-item" onclick="openLeague('BL1')">
            <span class="gold-icon">🇩🇪</span>
            <span class="item-label">Бундеслига</span>
        </div>

        <div class="menu-item" onclick="openLeague('SA')">
            <span class="gold-icon">🇮🇹</span>
            <span class="item-label">Серия А</span>
        </div>

        <div class="menu-item" onclick="openLeague('CL')">
            <span class="gold-icon">🏆</span>
            <span class="item-label">Лига Чемпионов</span>
        </div>

        <div class="menu-item" onclick="openLeague('FL1')">
            <span class="gold-icon">🇫🇷</span>
            <span class="item-label">Лига 1</span>
        </div>

        <div class="menu-item" onclick="openLeague('DED')">
            <span class="gold-icon">🇳🇱</span>
            <span class="item-label">Эредивизи</span>
        </div>

        <div class="menu-item" onclick="openLeague('PPL')">
            <span class="gold-icon">🇵🇹</span>
            <span class="item-label">Примейра</span>
        </div>

        <!-- Меню -->
        <div class="menu-item" onclick="openProfile()">
            <span class="gold-icon">👤</span>
            <span class="item-label">Профиль</span>
        </div>

        <div class="menu-item" onclick="openBonus()">
            <span class="gold-icon">🎁</span>
            <span class="item-label">Бонусы</span>
        </div>

    </div>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.ready();
tg.expand();

function openLeague(code){
    alert("Нажата лига: " + code);
}

function openProfile(){
    alert("Открыт профиль");
}

function openBonus(){
    alert("Открыты бонусы");
}
</script>

</body>
</html>
