<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LUDIK AI</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root {
    --bg: #050505;
    --neon: #bc13fe;
    --gold: linear-gradient(180deg,#ffe57e 0%,#d4af37 40%,#b8860b 100%);
}
* { box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html, body {height:100%;width:100%;background:var(--bg);font-family:'Inter',sans-serif;color:white;display:flex;flex-direction:column;align-items:center;padding:20px;}
.app-title {font-family:'Orbitron',sans-serif;font-size:20px;background:var(--gold);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-transform:uppercase;margin:10px 0 20px;text-shadow:0 0 15px rgba(188,19,254,0.6);animation:neonGlow 2s infinite alternate;}
.main-card {width:100%;max-width:420px;background:rgba(15,15,15,0.98);border:2px solid var(--neon);border-radius:30px;padding:20px;box-shadow:0 0 20px var(--neon);}
.menu-grid {display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.menu-item {background:#111;border:2px solid var(--neon);border-radius:25px;padding:25px 10px;text-align:center;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:all 0.3s;}
.menu-item:hover {box-shadow:0 0 20px #bc13fe,0 0 40px #bc13fe inset;transform:scale(1.05);border-color:#ffe57e;}
.menu-item:active {background:#222;transform:scale(0.95);border-color:#ffe57e;}
.gold-icon {font-size:28px;margin-bottom:5px;}
.item-label {font-size:11px;color:#f3cf7a;text-transform:uppercase;font-weight:900;}
.overlay {display:none;position:fixed;inset:0;background:rgba(0,0,0,0.95);z-index:900;}
.popup {display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0.8);width:90%;max-width:380px;background:#0a0a0a;border:2px solid #d4af37;border-radius:25px;padding:20px;z-index:1000;text-align:center;overflow-y:auto;max-height:80%;opacity:0;transition:transform 0.3s,opacity 0.3s;}
.popup.open {transform:translate(-50%,-50%) scale(1);opacity:1;}
.close-btn {background:#222;color:#888;padding:12px;width:100%;border-radius:15px;margin-top:15px;border:1px solid #444;font-weight:bold;transition:all 0.2s;}
.close-btn:hover {background:#333;color:#fff;}
.action-btn {background:var(--gold);color:black;padding:14px;width:100%;border-radius:15px;margin-top:10px;border:none;font-weight:900;display:inline-block;text-decoration:none;transition:all 0.2s;}
.action-btn:hover {box-shadow:0 0 15px #ffe57e,0 0 25px #d4af37 inset;transform:scale(1.02);}
.league-grid {display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px;}
.league-btn {background:#1a1a1a;color:white;border:1px solid #333;padding:10px;border-radius:12px;font-size:11px;cursor:pointer;transition:all 0.2s;}
.league-btn:hover {background:#222;border-color:#ffe57e;}
.stat-row {display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #222;font-size:14px;}
.gold-t {color:#d4af37;font-weight:bold;}
.bonus-link {display:block;background:#111;color:#ffe57e;padding:12px;margin:8px 0;border-radius:12px;text-decoration:none;border:1px solid #d4af37;font-weight:bold;transition:all 0.2s;}
.bonus-link:hover {background:#222;color:#fff;}
table {width:100%;border-collapse:collapse;margin-top:10px;}
th,td {border:1px solid #444;padding:8px;font-size:12px;text-align:center;}
th {background:#1a1a1a;}
@keyframes neonGlow {0%,100% {text-shadow:0 0 10px #bc13fe,0 0 20px #bc13fe,0 0 30px #bc13fe,0 0 40px #bc13fe;}50% {text-shadow:0 0 20px #ffe57e,0 0 30px #ffe57e,0 0 40px #ffe57e,0 0 50px #ffe57e;}}
</style>
</head>
<body ontouchstart="tg.expand()">

<div class="app-title">LUDIK AI</div>

<div class="main-card">
    <div class="menu-grid">
        <div class="menu-item"><span class="gold-icon">⚽️</span><span class="item-label">ПРОГНОЗЫ</span></div><div class="menu-item"><span class="gold-icon">💎</span><span class="item-label">VIP ДОСТУП</span></div>
        <div class="menu-item"><span class="gold-icon">👤</span><span class="item-label">ПРОФИЛЬ</span></div>
        <div class="menu-item"><span class="gold-icon">🎁</span><span class="item-label">БОНУСЫ</span></div>
        <div class="menu-item"><span class="gold-icon">🔗</span><span class="item-label">РЕФЕРАЛ</span></div>
        <div class="menu-item"><span class="gold-icon">📊</span><span class="item-label">СТАТИСТИКА</span></div>
        <div class="menu-item"><span class="gold-icon">⚔️</span><span class="item-label">БИТВА ЛУДИКОВ</span></div>
        <div class="menu-item"><span class="gold-icon">🔥</span><span class="item-label">ЖБ ДНЯ</span></div>
        <div class="menu-item"><span class="gold-icon">📜</span><span class="item-label">ИСТОРИЯ ПРОГНОЗОВ</span></div>
        <div class="menu-item"><span class="gold-icon">💬</span><span class="item-label">ЧАТ</span></div>
    </div>
</div>

<div class="overlay" id="overlay"></div>

<!-- Прогнозы -->
<div id="predictP" class="popup">
    <h3 style="color:#ffe57e">ЛИГИ</h3>
    <div class="league-grid" id="leagueBox"></div>
    <div id="pRes" style="margin-top:15px;color:#00ff00;font-size:13px;"></div>
    <button class="close-btn">ЗАКРЫТЬ</button>
</div>

<!-- ЖБ дня -->
<div id="jbP" class="popup">
    <h2 style="color:#bc13fe">ЖБ ДНЯ</h2>
    <p id="jbContent" style="font-size:12px;margin:15px 0;">Загрузка...</p>
    <button class="close-btn">ЗАКРЫТЬ</button>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.ready();
tg.expand();

// overlay
const overlay = document.getElementById('overlay');

// закрытие всех popup
function closeAll(){
    overlay.style.display='none';
    document.querySelectorAll('.popup').forEach(p=>{
        p.style.display='none';
        p.classList.remove('open');
    });
}

// клик по overlay
overlay.addEventListener('click',closeAll);

// закрытие кнопкам
document.querySelectorAll('.close-btn').forEach(btn=>{
    btn.addEventListener('click',closeAll);
});

// меню
document.querySelectorAll('.menu-item').forEach(item=>{
    item.addEventListener('click',()=>{
        const label = item.querySelector('.item-label').innerText;
        const map = {
            'ПРОГНОЗЫ':'predictP',
            'ЖБ ДНЯ':'jbP'
        };
        if(map[label]){
            openP(map[label]);
            if(label==='ПРОГНОЗЫ') openPredict();
            if(label==='ЖБ ДНЯ') openJB();
        }
    });
});

function openP(id){
    const popup = document.getElementById(id);
    if(!popup) return alert('Попап не найден: '+id);
    overlay.style.display='block';
    popup.style.display='block';
    popup.classList.add('open');
}

// Прогнозы
const leagues={"PL":"АПЛ","PD":"Ла Лига","BL1":"Бундес","SA":"Серия А","CL":"ЛЧ","RPL":"РПЛ","MLS":"MLS","EL":"ЛЕ"};
const leagueBox = document.getElementById('leagueBox');

function openPredict(){
    leagueBox.innerHTML="";
    Object.keys(leagues).forEach(code=>{
        const btn = document.createElement('button');
        btn.className='league-btn';
        btn.innerText = leagues[code];
        btn.onclick=()=>getPredict(code);
        leagueBox.appendChild(btn);
    });
}

// fetch прогнозов
async function getPredict(code){
    const resBox=document.getElementById('pRes');
    resBox.innerText='Загрузка...';
    try{
        const res = await fetch(`http://localhost:3000/predict?league=${code}`);
        const data = await res.json();
        if(data.length>0){
            resBox.innerHTML = data.map(m=>`${m.match} <br><span style="color:#ffe57e">Прогноз: ${m.prediction}</span>`).join('<hr>');
        }else resBox.innerText='Матчей нет';
    }catch(e){resBox.innerText='Ошибка API';}
}

// ЖБ дня
function openJB(){
    const jb = document.getElementById('jbContent');
    jb.innerText = 'Прогноз дня: ТБ 2.5 – Лудик уверен!';
}
</script>

</body>
</html>
