<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>LUDIK AI</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root {
    --bg-gradient: linear-gradient(135deg, #111 0%, #1a1a1a 50%, #111 100%);
    --gold-gradient: linear-gradient(180deg,#ffe57e 0%,#d4af37 40%,#b8860b 100%);
    --gold-glow: rgba(255,215,0,0.6);
    --accent-neon: #bc13fe;
}
* { box-sizing: border-box; margin:0; padding:0; -webkit-tap-highlight-color: transparent;}
html, body {height:100%; width:100%; overflow:hidden; background: var(--bg-gradient); font-family: 'Inter', sans-serif; color:white; position: relative;}
body {display:flex; flex-direction:column; align-items:center; padding:20px; animation:bgGlow 12s ease-in-out infinite alternate;}
@keyframes bgGlow {
    0% {background-position:0% 50%;}
    100% {background-position:100% 50%;}
}
.app-title {
    font-family:'Orbitron', sans-serif;
    font-size:26px;
    background: var(--gold-gradient);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    text-transform:uppercase;
    margin:10px 0 25px;
    text-shadow:0 0 20px var(--gold-glow);
    animation:glowTitle 2s infinite alternate;
}
@keyframes glowTitle{
    0% {text-shadow:0 0 20px var(--gold-glow);}
    50% {text-shadow:0 0 30px var(--gold-glow);}
    100% {text-shadow:0 0 20px var(--gold-glow);}
}
.main-card {
    width:100%; max-width:440px;
    background:rgba(20,20,20,0.95);
    border:2px solid var(--accent-neon);
    border-radius:35px;
    padding:25px;
    box-shadow:0 0 30px var(--accent-neon);
    z-index:10; position:relative; touch-action:auto;
    transition: transform 0.2s;
}
.main-card:hover {transform:scale(1.02);}
.menu-grid {display:grid; grid-template-columns:1fr 1fr; gap:14px;}
.menu-item {
    background:#111;
    border:2px solid var(--accent-neon);
    border-radius:28px;
    padding:25px 12px;
    text-align:center;
    cursor:pointer;
    position:relative;
    z-index:20;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    touch-action: manipulation;
    transition: all 0.2s;
}
.menu-item:hover {
    border-image: linear-gradient(180deg,#ffe57e,#d4af37,#b8860b) 1;
    box-shadow:0 0 15px var(--gold-glow);
}
.menu-item:active {
    background:#222;
    transform:scale(0.96);
    border-image: linear-gradient(180deg,#ffe57e,#d4af37,#b8860b) 1;
}
.gold-icon {font-size:28px; display:block; margin-bottom:5px; pointer-events:none;}
.item-label {font-size:12px; color:#f3cf7a; text-transform:uppercase; font-weight:900; pointer-events:none;}
.overlay {display:none; position:fixed; inset:0; background:rgba(0,0,0,0.95); z-index:900;}
.popup {
    display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%);
    width:90%; max-width:380px; background:#0a0a0a;
    border:2px solid #d4af37; border-radius:25px;
    padding:20px; z-index:1000; text-align:center; overflow-y:auto; max-height:80%;
    animation:popupAppear 0.3s ease forwards;
}
@keyframes popupAppear {from {opacity:0; transform:translate(-50%, -48%);} to {opacity:1; transform:translate(-50%, -50%);}}
.close-btn {background:#222; color:#888; padding:12px; width:100%; border-radius:15px; margin-top:15px; border:1px solid #444; font-weight:bold; transition:0.2s;}
.close-btn:hover {background:#333; color:#fff;}
.action-btn {background:var(--gold-gradient); color:black; padding:14px; width:100%; border-radius:15px; margin-top:10px; border:none; font-weight:900; display:inline-block; text-decoration:none; transition:0.2s;}
.action-btn:hover {transform:scale(1.03);}
.league-grid {display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:10px;}
.league-btn {background:#1a1a1a; color:white; border:1px solid #333; padding:10px; border-radius:14px; font-size:12px; transition:0.2s;}
.league-btn:hover {border-image: linear-gradient(180deg,#ffe57e,#d4af37,#b8860b) 1; transform:scale(1.05);}
.stat-row {display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px solid #222; font-size:14px;}
.gold-t {color:#d4af37; font-weight:bold;}
.bonus-link {display:block; background:#111; color:#ffe57e; padding:12px; margin:8px 0; border-radius:14px; text-decoration:none; border:1px solid #d4af37; font-weight:bold; transition:0.2s;}
.bonus-link:hover {background:#222;}
table {width:100%; border-collapse:collapse; margin-top:10px;}
th, td {border:1px solid #444; padding:8px; font-size:12px; text-align:center;}
th {background:#1a1a1a;}
</style>
</head>
<body ontouchstart="tg.expand()">

<div class="app-title">LUDIK AI</div>

<div class="main-card">
    <div class="menu-grid">
        <div class="menu-item" onclick="openPredict()"><span class="gold-icon">⚽</span><span class="item-label">ПРОГНОЗЫ</span></div>
        <div class="menu-item" onclick="openP('vipP')"><span class="gold-icon">💎</span><span class="item-label">VIP ДОСТУП</span></div>
        <div class="menu-item" onclick="openP('profileP')"><span class="gold-icon">👤</span><span class="item-label">ПРОФИЛЬ</span></div>
        <div class="menu-item" onclick="openP('bonusP')"><span class="gold-icon">🎁</span><span class="item-label">БОНУСЫ</span></div>
        <div class="menu-item" onclick="openP('refP')"><span class="gold-icon">🔗</span><span class="item-label">РЕФЕРАЛ</span></div>
        <div class="menu-item" onclick="openP('statsP')"><span class="gold-icon">📊</span><span class="item-label">СТАТИСТИКА</span></div>
        <div class="menu-item" onclick="openP('battleP')"><span class="gold-icon">⚔️</span><span class="item-label">БИТВА ЛУДИКОВ</span></div>
        <div class="menu-item" onclick="openP('jbP')"><span class="gold-icon">🔥</span><span class="item-label">ЖБ ДНЯ</span></div>
        <div class="menu-item" onclick="openP('historyP')"><span class="gold-icon">📜</span><span class="item-label">ИСТОРИЯ ПРОГНОЗОВ</span></div>
        <div class="menu-item" onclick="openP('chatP')"><span class="gold-icon">💬</span><span class="item-label">ЧАТ</span></div>
    </div>
</div>

<div class="overlay" id="overlay" onclick="closeAll()"></div>

<!-- ЖБ ДНЯ -->
<div id="jbP" class="popup">
    <h2 style="color:#d4af37">ЖБ ДНЯ</h2>
    <p id="jbContent" style="font-size:13px; margin:15px 0; animation:glowText 2s infinite alternate;">Сегодня: Прогноз дня — ТБ 2.5 ⚽</p>
    <button class="close-btn" onclick="closeAll()">ЗАКРЫТЬ</button>
</div>

<!-- РЕФЕРАЛ -->
<div id="refP" class="popup">
    <h2>РЕФЕРАЛЫ</h2>
    <p id="refLink" style="font-size:11px; color:#888; background:#111; padding:10px; border-radius:10px; word-break:break-all;">https://t.me/LudikWin_bot?start=USERID</p>
    <button class="action-btn" onclick="copyRef()">КОПИРОВАТЬ</button>
    <button class="close-btn" onclick="closeAll()">ЗАКРЫТЬ</button>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.ready();
tg.expand();
const user = tg.initDataUnsafe?.user;
if(user){
    document.getElementById('uID').innerText = user.id;
    document.getElementById('refLink').innerText = 'https://t.me/LudikWin_bot?start='+user.id;
}

function openP(id){
    closeAll();
    document.getElementById('overlay').style.display='block';
    document.getElementById(id).style.display='block';
    tg.expand();
}

function closeAll(){
    document.getElementById('overlay').style.display='none';
    document.querySelectorAll('.popup').forEach(p=>p.style.display='none');
}

function copyRef(){
    const link=document.getElementById('refLink').innerText;
    const el=document.createElement('textarea');
    el.value=link;
    document.body.appendChild(el);
    el.select();
    document.execCommand('copy');
    document.body.removeChild(el);
    tg.showAlert("Скопировано!");
}

// Мини анимация ЖБ текста
const style=document.createElement('style');
style.innerHTML=`@keyframes glowText{from{color:#ffe57e;}to{color:#d4af37;}}`;
document.head.appendChild(style);

// Битва Лудиков
function generateBattle(){
    const box=document.getElementById('battleBox');
    box.innerHTML="";
    const options=['Победа К1','Ничья','Победа К2'];
    options.forEach(o=>{
        const b=document.createElement('button');
        b.className='action-btn';
        b.innerText=o;
        b.onclick=()=>tg.showAlert('Вы выбрали: '+o);
        box.appendChild(b);
    });
}
generateBattle();
</script>

</body>
</html>
