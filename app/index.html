<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>LUDIK AI</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

<style>
:root {
    --bg: #050505;
    --neon: #bc13fe;
    --gold: linear-gradient(180deg,#ffe57e 0%,#d4af37 40%,#b8860b 100%);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
    height: 100%;
    background: var(--bg);
    font-family: 'Inter', sans-serif;
    color: white;
}

body {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
}

.app-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 20px;
    background: var(--gold);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin: 15px 0 20px;
    text-transform: uppercase;
}

.main-card {
    width: 100%;
    max-width: 420px;
    background: rgba(15,15,15,0.98);
    border: 2px solid var(--neon);
    border-radius: 30px;
    padding: 20px;
    box-shadow: 0 0 20px var(--neon);
}

.menu-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
}

.menu-item {
    background: #111;
    border: 2px solid var(--neon);
    border-radius: 25px;
    padding: 25px 10px;
    text-align: center;
    cursor: pointer;
    transition: 0.2s;
    box-shadow: 0 0 15px var(--neon);
}

.menu-item:active {
    background: #222;
    border-color: #ffe57e;
    transform: scale(0.97);
}

.gold-icon {
    font-size: 26px;
    display: block;
    margin-bottom: 8px;
}

.item-label {
    font-size: 12px;
    color: #f3cf7a;
    text-transform: uppercase;
    font-weight: 900;
}

.hidden { display: none; }

.back-btn {
    margin-bottom: 15px;
    font-size: 12px;
    cursor: pointer;
    color: #f3cf7a;
}
</style>
</head>

<body>

<div class="app-title">LUDIK AI</div>

<div class="main-card">

    <!-- Главное меню -->
    <div id="mainMenu" class="menu-grid">

        <div class="menu-item" onclick="openPredictions()">
            <span class="gold-icon">🔮</span>
            <span class="item-label">Прогнозы</span>
        </div>

        <div class="menu-item" onclick="vip()">
            <span class="gold-icon">💎</span>
            <span class="item-label">VIP</span>
        </div>

        <div class="menu-item" onclick="referral()">
            <span class="gold-icon">🤝</span>
            <span class="item-label">Реферал</span>
        </div>

        <div class="menu-item" onclick="jbDay()">
            <span class="gold-icon">🔥</span>
            <span class="item-label">ЖБ дня</span>
        </div>

        <div class="menu-item" onclick="stats()">
            <span class="gold-icon">📊</span>
            <span class="item-label">Статистика</span>
        </div>

        <div class="menu-item" onclick="profile()">
            <span class="gold-icon">👤</span>
            <span class="item-label">Профиль</span>
        </div>

        <div class="menu-item" onclick="bonus()">
            <span class="gold-icon">🎁</span>
            <span class="item-label">Бонусы</span>
        </div>

    </div>

    <!-- Меню лиг -->
    <div id="leagueMenu" class="menu-grid hidden">

        <div class="back-btn" onclick="back()">← Назад</div>

        <div class="menu-item" onclick="openLeague('PL')">🇬🇧 АПЛ</div>
        <div class="menu-item" onclick="openLeague('PD')">🇪🇸 Ла Лига</div>
        <div class="menu-item" onclick="openLeague('BL1')">🇩🇪 Бундеслига</div>
        <div class="menu-item" onclick="openLeague('SA')">🇮🇹 Серия А</div>
        <div class="menu-item" onclick="openLeague('CL')">🏆 ЛЧ</div>
        <div class="menu-item" onclick="openLeague('FL1')">🇫🇷 Лига 1</div>
        <div class="menu-item" onclick="openLeague('DED')">🇳🇱 Эредивизи</div>
        <div class="menu-item" onclick="openLeague('PPL')">🇵🇹 Примейра</div>

    </div>

</div>

<script>
const tg = window.Telegram.WebApp;
tg.ready();
tg.expand();

function openPredictions(){
    document.getElementById("mainMenu").classList.add("hidden");
    document.getElementById("leagueMenu").classList.remove("hidden");
}

function back(){
    document.getElementById("leagueMenu").classList.add("hidden");
    document.getElementById("mainMenu").classList.remove("hidden");
}

function openLeague(code){
    alert("Лига: " + code);
}

function vip(){ alert("VIP раздел"); }
function referral(){ alert("Реферальная система"); }
function jbDay(){ alert("ЖБ дня"); }
function stats(){ alert("Статистика"); }
function profile(){ alert("Профиль"); }
function bonus(){ alert("Бонусы"); }
</script>

</body>
</html>
