<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LUDIK AI PREDICTOR</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --neon: #bc13fe;
            --gold: linear-gradient(180deg, #ffe57e 0%, #d4af37 40%, #b8860b 100%);
            --glass: rgba(20, 20, 20, 0.9);
        }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .app-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 18px;
            background: var(--gold);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
        }

        .main-card {
            width: 100%;
            max-width: 400px;
            background: var(--glass);
            border: 2px solid var(--neon);
            border-radius: 30px;
            padding: 15px;
            box-shadow: 0 0 30px rgba(188, 19, 254, 0.2);
            backdrop-filter: blur(10px);
        }

        /* Сетка лиг */
        .menu-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .menu-item {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 15px;
            padding: 12px;
            text-align: center;
            transition: 0.2s;
        }

        .menu-item:active { transform: scale(0.95); border-color: var(--neon); }

        .item-label { font-size: 10px; color: #f3cf7a; text-transform: uppercase; font-weight: bold; display: block; margin-top: 5px; }
        
        .gold-icon { font-size: 24px; filter: sepia(1) saturate(3); }

        /* Окно прогноза (Popup) */
        #predictionPopup {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 85%;
            background: #111;
            border: 2px solid #d4af37;
            border-radius: 25px;
            padding: 20px;
            z-index: 100;
            text-align: center;
            box-shadow: 0 0 50px rgba(0,0,0,0.9);
        }

        .close-btn {
            margin-top: 15px;
            background: var(--gold);
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: bold;
            width: 100%;
        }

        .overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 99;
        }
    </style>
</head>
<body>

    <div class="app-title">LUDIK AI PREDICTOR</div>

    <div class="main-card">
        <div style="text-align:center; margin-bottom:15px;">
            <div style="font-size:10px; color:#888;">ВАШ БАЛАНС</div>
            <div id="userBalance" style="font-size:32px; font-weight:900; background:var(--gold); -webkit-background-clip:text; -webkit-text-fill-color:transparent;">100.00</div>
        </div>

        <div class="menu-grid">
            <div class="menu-item" onclick="showPredict('Англия 🏴󠁧󠁢󠁥󠁮󠁧󠁿')">
                <span class="gold-icon">⚽</span><span class="item-label">АПЛ</span>
            </div>
            <div class="menu-item" onclick="showPredict('Испания 🇪🇸')">
                <span class="gold-icon">🏆</span><span class="item-label">Ла Лига</span>
            </div><div class="menu-item" onclick="showPredict('Германия 🇩🇪')">
                <span class="gold-icon">🛡️</span><span class="item-label">Бундеслига</span>
            </div>
            <div class="menu-item" onclick="showPredict('Италия 🇮🇹')">
                <span class="gold-icon">🔱</span><span class="item-label">Серия А</span>
            </div>
            <div class="menu-item" onclick="showPredict('Франция 🇫🇷')">
                <span class="gold-icon">💎</span><span class="item-label">Лига 1</span>
            </div>
            <div class="menu-item" onclick="showPredict('ЖБ ДНЯ 🔥')">
                <span class="gold-icon">✨</span><span class="item-label">ЖБ ДНЯ</span>
            </div>
            <div class="menu-item" onclick="tg.sendData('get_bonuses')">
                <span class="gold-icon">🎁</span><span class="item-label">Бонусы</span>
            </div>
            <div class="menu-item" onclick="tg.sendData('get_chat')">
                <span class="gold-icon">💬</span><span class="item-label">Чат</span>
            </div>
        </div>
    </div>

    <div class="overlay" id="overlay"></div>
    <div id="predictionPopup">
        <h2 style="color:#d4af37; margin-bottom:10px;" id="popTitle">АНАЛИЗ...</h2>
        <div id="popBody" style="font-size:14px; line-height:1.5;">
            Идет расчет нейросетью...
        </div>
        <button class="close-btn" onclick="closePopup()">ЗАКРЫТЬ</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        const urlParams = new URLSearchParams(window.location.search);
        document.getElementById('userBalance').innerText = urlParams.get('balance') || "100.00";

        function showPredict(league) {
            tg.HapticFeedback.impactOccurred('medium');
            document.getElementById('overlay').style.display = 'block';
            document.getElementById('predictionPopup').style.display = 'block';
            document.getElementById('popTitle').innerText = league;
            
            // Имитация работы AI
            setTimeout(() => {
                document.getElementById('popBody').innerHTML = `
                    <div style="border-bottom:1px solid #333; padding-bottom:10px; margin-bottom:10px;">
                        <b>Матч найден!</b><br>Прогноз: <span style="color:#00ff00">Победа 1</span>
                    </div>
                    <div>Коэффициент: <b>1.95</b></div>
                    <div>Проходимость: <b>87%</b></div>
                `;
            }, 1500);
        }

        function closePopup() {
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('predictionPopup').style.display = 'none';
            document.getElementById('popBody').innerText = "Идет расчет нейросетью...";
        }
    </script>
</body>
</html>
