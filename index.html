<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LUDIK AI PREDICTOR</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;500;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #121212;
            --neon-purple: #bc13fe;
            --gold: linear-gradient(180deg, #ffcf48 0%, #b8860b 100%);
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(188, 19, 254, 0.3);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            overflow: hidden;
        }

        /* Заголовок сверху */
        .app-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 18px;
            color: var(--neon-purple);
            text-shadow: 0 0 15px rgba(188, 19, 254, 0.6);
            margin-bottom: 30px;
            letter-spacing: 2px;
            animation: fadeInDown 0.8s ease;
        }

        /* Основной контейнер-рамка */
        .main-container {
            width: 100%;
            max-width: 380px;
            border: 2px solid var(--neon-purple);
            border-radius: 30px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.4);
            box-shadow: 0 0 30px rgba(188, 19, 254, 0.15);
            animation: zoomIn 0.6s ease;
        }

        /* Карточка баланса */
        .balance-section {
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 25px;
            position: relative;
        }

        .balance-label {
            font-size: 11px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .balance-value {
            font-family: 'Inter', sans-serif;
            font-size: 48px;
            font-weight: 800;
            background: var(--gold);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 5px 0;
        }

        .balance-currency {
            color: var(--neon-purple);
            font-size: 12px;
            font-weight: bold;
        }

        /* Сетка кнопок */
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 20px;
        }

        .grid-item {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: 0.3s;
        }

        .grid-item:active {
            background: rgba(188, 19, 254, 0.1);
            border-color: var(--neon-purple);
            transform: scale(0.96);
        }

        .icon-gold {
            width: 24px;
            height: 24px;
            filter: drop-shadow(0 0 2px #ffcf48);
        }

        .item-text {
            font-size: 13px;
            font-weight: 500;
            color: #efefef;
        }

        /* Большая кнопка */
        .action-btn {
            width: 100%;
            background: var(--gold);
            border: none;
            border-radius: 50px;
            padding: 18px;
            margin-top: 30px;
            font-weight: 800;
            font-size: 14px;
            text-transform: uppercase;
            color: #000;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.4);
            cursor: pointer;
        }.action-btn:active {
            transform: translateY(2px);
            filter: brightness(0.9);
        }

        /* Анимации */
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes zoomIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

    </style>
</head>
<body>

    <div class="app-title">LUDIK AI PREDICTOR</div>

    <div class="main-container">
        
        <div class="balance-section">
            <div class="balance-label">Твой баланс</div>
            <div class="balance-value" id="userBalance">100.00</div>
            <div class="balance-currency">LUDIK COINS</div>
            <div style="position: absolute; top: 15px; right: 15px; color: #555;">ⓘ</div>
        </div>

        <div style="text-align: center; color: #888; font-size: 14px; margin-bottom: 15px;">MENU</div>

        <div class="grid">
            <div class="grid-item" onclick="tgAlert('Статистика')">
                <img src="https://img.icons8.com/ios-filled/50/ffcf48/line-chart.png" class="icon-gold">
                <span class="item-text">Статистика</span>
            </div>
            <div class="grid-item" onclick="tgAlert('VIP Чат')">
                <img src="https://img.icons8.com/ios-filled/50/ffcf48/diamond--v1.png" class="icon-gold">
                <span class="item-text">VIP Чат</span>
            </div>
            <div class="grid-item" onclick="tgAlert('Бонусы')">
                <img src="https://img.icons8.com/ios-filled/50/ffcf48/gift.png" class="icon-gold">
                <span class="item-text">Бонусы</span>
            </div>
            <div class="grid-item" onclick="tgAlert('Настройки')">
                <img src="https://img.icons8.com/ios-filled/50/ffcf48/settings.png" class="icon-gold">
                <span class="item-text">Настройки</span>
            </div>
        </div>

        <button class="action-btn" onclick="startAnalysis()">Запустить AI Анализ</button>

    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        tg.headerColor = "#121212";

        // Читаем баланс из параметров URL
        const params = new URLSearchParams(window.location.search);
        const bal = params.get('balance');
        if (bal) document.getElementById('userBalance').innerText = bal;

        function startAnalysis() {
            tg.HapticFeedback.impactOccurred('heavy');
            tg.showConfirm("Вы уверены, что хотите запустить анализ?", (ok) => {
                if(ok) {
                    tg.sendData("analyze_now");
                    tg.close();
                }
            });
        }

        function tgAlert(text) {
            tg.HapticFeedback.selectionChanged();
            tg.showAlert("Раздел '" + text + "' скоро будет доступен!");
        }
    </script>
</body>
</html>
