<div class="balance-label">Ваш текущий баланс</div>
        <div class="balance-val" id="userBalance">100.00</div>
        <div style="color: var(--neon-purple); font-size: 10px; margin-top: 5px;">LUDIK COINS</div>
    </div>

    <div class="grid">
        <div class="item" onclick="tg.showAlert('Раздел Статистика в разработке')">
            <span class="icon">📈</span>
            <span class="item-label">Статистика</span>
        </div>
        <div class="item" onclick="tg.showAlert('Доступно только VIP пользователям')">
            <span class="icon">💎</span>
            <span class="item-label">VIP Чат</span>
        </div>
        <div class="item" onclick="tg.showAlert('Новые бонусы завтра!')">
            <span class="icon">🎁</span>
            <span class="item-label">Бонусы</span>
        </div>
        <div class="item" onclick="tg.showAlert('Настройки профиля')">
            <span class="icon">⚙️</span>
            <span class="item-label">Профиль</span>
        </div>
    </div>

    <button class="main-btn" onclick="startAnalysis()">Запустить AI Анализ</button>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        tg.headerColor = "#050505";
        tg.backgroundColor = "#050505";

        if (tg.initDataUnsafe.user) {
            document.getElementById('userName').innerText = ${tg.initDataUnsafe.user.first_name} | LUDIK AI;
        }

        function startAnalysis() {
            tg.HapticFeedback.impactOccurred('heavy');
            tg.showConfirm("Использовать 10 LC для анализа матча?", (ok) => {
                if(ok) {
                    tg.sendData("analyze_now");
                    tg.close();
                }
            });
        }
    </script>
</body>
</html>
