<!DOCTYPE html>
<html lang="ru" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="google" content="notranslate">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LUDIK AI PREDICTOR</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --neon: #bc13fe;
            --gold: linear-gradient(180deg, #ffe57e 0%, #d4af37 40%, #b8860b 100%);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { background-color: var(--bg); color: white; font-family: 'Inter', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 15px; min-height: 100vh; }
        
        .app-title { font-family: 'Orbitron', sans-serif; font-size: 18px; background: var(--gold); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 15px 0; text-transform: uppercase; letter-spacing: 1px; }
        
        .main-card { width: 100%; max-width: 400px; background: rgba(15,15,15,0.98); border: 2px solid var(--neon); border-radius: 30px; padding: 20px; box-shadow: 0 0 20px rgba(188, 19, 254, 0.2); }
        
        .balance-box { text-align: center; margin-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 15px; }
        .balance-amount { font-size: 36px; font-weight: 900; background: var(--gold); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .menu-item { background: #111; border: 1px solid rgba(212, 175, 55, 0.2); border-radius: 20px; padding: 15px; text-align: center; cursor: pointer; transition: 0.2s; }
        .menu-item:active { background: #1a1a1a; transform: scale(0.96); border-color: var(--neon); }
        .gold-icon { font-size: 24px; display: block; margin-bottom: 5px; }
        .item-label { font-size: 10px; color: #f3cf7a; text-transform: uppercase; font-weight: 800; }
        
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(5px); z-index: 99; }
        .popup { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 85%; background: #0a0a0a; border: 2px solid #d4af37; border-radius: 25px; padding: 25px; z-index: 100; text-align: center; }
        
        .row { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 13px; border-bottom: 1px solid #222; padding-bottom: 5px; text-align: left; }
        .gold-t { color: #d4af37; font-weight: bold; }
        
        .btn-link { display: block; width: 100%; background: var(--gold); color: black; text-decoration: none; padding: 14px; border-radius: 12px; font-weight: 900; margin-bottom: 10px; text-transform: uppercase; font-size: 11px; border: none; cursor: pointer; text-align: center; }
        .close-btn { background: none; border: 1px solid #444; color: #888; padding: 10px; width: 100%; border-radius: 12px; margin-top: 10px; font-size: 12px; cursor: pointer; }
        
        .loading-dots:after { content: '.'; animation: dots 1s steps(5, end) infinite;}
        @keyframes dots { 0%, 20% { color: rgba(0,0,0,0); text-shadow: .2em 0 0 rgba(0,0,0,0), .4em 0 0 rgba(0,0,0,0); } 40% { color: #d4af37; text-shadow: .2em 0 0 rgba(0,0,0,0), .4em 0 0 rgba(0,0,0,0); } 60% { text-shadow: .2em 0 0 #d4af37, .4em 0 0 rgba(0,0,0,0); } 80%, 100% { text-shadow: .2em 0 0 #d4af37, .4em 0 0 #d4af37; } }
    </style>
</head>
<body>

    <div class="app-title">LUDIK AI PREDICTOR</div>

    <div class="main-card">
        <div class="balance-box">
            <p style="font-size: 10px; color: #888;">ВАШ БАЛАНС</p>
            <div id="userBalance" class="balance-amount">100.00</div><div class="row"><span>Ваш Ранг:</span><span class="gold-t">МАСТЕР</span></div>
            <div class="row"><span>Точность AI:</span><span style="color:#0f0">94.2%</span></div>
        </div>
        <button class="btn-link" onclick="dailyBonus()" id="dailyBtn">🎁 ЕЖЕДНЕВНЫЙ БОНУС</button>
        <button class="close-btn" onclick="closeAll()">ЗАКРЫТЬ</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();
        let balance = 100.00;
        document.getElementById('userBalance').innerText = balance.toFixed(2);

        // Функция подтяжки реальных матчей
        async function fetchLiveMatches(leagueCode, leagueName) {
            openP('predictP');
            document.getElementById('pLeague').innerText = leagueName;
            document.getElementById('pTitle').innerText = "АНАЛИЗ СОСТАВОВ...";
            document.getElementById('pStats').innerHTML = '<div class="loading-dots" style="color:#d4af37; font-weight:900; padding:20px;">LUDIK AI ПОЛУЧАЕТ ДАННЫЕ НА ' + new Date().toLocaleDateString() + '</div>';

            try {
                // Подключаемся к базе Football Data
                const response = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent('https://raw.githubusercontent.com/openfootball/football.json/master/2024-25/en.1.json')}`);
                const rawData = await response.json();
                const data = JSON.parse(rawData.contents);

                setTimeout(() => {
                    // Выбираем случайную пару из базы лиги (имитация выбора сегодняшней игры)
                    const match = data.rounds[0].matches[Math.floor(Math.random() * data.rounds[0].matches.length)];
                    const t1 = match.team1;
                    const t2 = match.team2;
                    
                    // Формируем прогноз на победителя
                    const variants = [`Победа ${t1}`, Победа ${t2}, Ничья, Фора ${t1} (0), `Фора ${t2} (0)`];
                    const winnerResult = variants[Math.floor(Math.random() * variants.length)];
                    
                    // Генерируем коэф и статы
                    const kf = (Math.random() * (2.10 - 1.35) + 1.35).toFixed(2);
                    const corners = (Math.random() * (10.5 - 7.5) + 7.5).toFixed(1) + " Б";
                    const cards = (Math.random() * (5.5 - 2.5) + 2.5).toFixed(1) + " Б";
                    const goals = (Math.random() * (3.5 - 1.5) + 1.5).toFixed(1) + " Б";

                    document.getElementById('pTitle').innerText = ${t1} vs ${t2};
                    document.getElementById('pStats').innerHTML = `
                        <div class="row"><span>КТО ПОБЕДИТ:</span><span class="gold-t" style="font-size:14px;">${winnerResult}</span></div>
                        <div class="row"><span>КОЭФФИЦИЕНТ:</span><span class="gold-t">${kf}</span></div>
                        <div class="row"><span>ТОТАЛ ГОЛОВ:</span><span>${goals}</span></div>
                        <div class="row"><span>УГЛОВЫЕ:</span><span>${corners}</span></div>
                        <div class="row"><span>КАРТОЧКИ:</span><span>${cards}</span></div>
                        <p style="font-size:10px; color:#555; margin-top:10px; text-align:center;">Анализ ИИ от ${new Date().toLocaleDateString()}</p>
                    `;
                    tg.HapticFeedback.notificationOccurred('success');
                }, 1800);

            } catch (err) {
                document.getElementById('pTitle').innerText = "ОШИБКА API";
                document.getElementById('pStats').innerHTML = <p style="color:red">Не удалось подтянуть живые матчи. Проверьте сеть.</p>;
            }
        }

        function dailyBonus() {
            balance += 50;
            document.getElementById('userBalance').innerText = balance.toFixed(2);
            document.getElementById('dailyBtn').innerText = "ПОЛУЧЕНО ✅";
            document.getElementById('dailyBtn').disabled = true;
            tg.HapticFeedback.notificationOccurred('success');
            tg.showAlert("Бонус +50 LC зачислен!");
        }

        function openP(id) {
            document.getElementById('overlay').style.display = 'block';
            document.getElementById(id).style.display = 'block';
            tg.HapticFeedback.selectionChanged();
        }

        function closeAll() {
            document.getElementById('overlay').style.display = 'none';
            document.querySelectorAll('.popup').forEach(p => p.style.display = 'none');
        }
    </script>
</body>
</html>
