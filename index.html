<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LUDIK AI</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #050505; --neon: #bc13fe; --gold: linear-gradient(180deg, #ffe57e 0%, #d4af37 40%, #b8860b 100%); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { height: 100vh; width: 100vw; margin: 0; padding: 0; overflow: hidden; background-color: var(--bg); }
        body { color: white; font-family: 'Inter', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 15px; }
        .app-title { font-family: 'Orbitron', sans-serif; font-size: 18px; background: var(--gold); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 15px 0; text-transform: uppercase; }
        .main-card { width: 100%; max-width: 400px; background: rgba(15,15,15,0.98); border: 2px solid var(--neon); border-radius: 30px; padding: 20px; box-shadow: 0 0 20px rgba(188, 19, 254, 0.2); }
        .balance-box { text-align: center; margin-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 15px; }
        .balance-amount { font-size: 36px; font-weight: 900; background: var(--gold); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .menu-item { background: #111; border: 1px solid rgba(212, 175, 55, 0.2); border-radius: 20px; padding: 15px; text-align: center; cursor: pointer; }
        .gold-icon { font-size: 24px; display: block; margin-bottom: 5px; }
        .item-label { font-size: 10px; color: #f3cf7a; text-transform: uppercase; font-weight: 800; }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 99; }
        .popup { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 85%; background: #0a0a0a; border: 2px solid #d4af37; border-radius: 25px; padding: 25px; z-index: 100; text-align: center; }
        .row { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 13px; border-bottom: 1px solid #222; padding-bottom: 5px; text-align: left; }
        .gold-t { color: #d4af37; font-weight: bold; }
        .btn-link { display: block; width: 100%; background: var(--gold); color: black; text-decoration: none; padding: 14px; border-radius: 12px; font-weight: 900; margin-bottom: 10px; font-size: 11px; text-align: center; border: none; }
        .close-btn { background: none; border: 1px solid #444; color: #888; padding: 10px; width: 100%; border-radius: 12px; margin-top: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="app-title">LUDIK AI PREDICTOR</div>
    <div class="main-card">
        <div class="balance-box">
            <div id="userBalance" class="balance-amount">100.00</div>
            <p style="color: var(--neon); font-size: 10px; font-weight: 900;">LUDIK COINS</p>
        </div>
        <div class="menu-grid">
            <div class="menu-item" onclick="apiFetch('PL', 'АПЛ')"><span class="gold-icon">🏴󠁧󠁢󠁥󠁮󠁧󠁿</span><span class="item-label">АПЛ</span></div>
            <div class="menu-item" onclick="apiFetch('PD', 'Ла Лига')"><span class="gold-icon">🇪🇸</span><span class="item-label">Ла Лига</span></div>
            <div class="menu-item" onclick="apiFetch('BL1', 'Бундеслига')"><span class="gold-icon">🇩🇪</span><span class="item-label">Бундеслига</span></div>
            <div class="menu-item" onclick="apiFetch('SA', 'Серия А')"><span class="gold-icon">🇮🇹</span><span class="item-label">Серия А</span></div><div class="menu-item" onclick="apiFetch('FL1', 'Лига 1')"><span class="gold-icon">🇫🇷</span><span class="item-label">Лига 1</span></div>
            <div class="menu-item" onclick="apiFetch('DED', 'Эредивизи')"><span class="gold-icon">🇳🇱</span><span class="item-label">Эредивизи</span></div>
            <div class="menu-item" onclick="apiFetch('PPL', 'Примейра')"><span class="gold-icon">🇵🇹</span><span class="item-label">Примейра</span></div>
            <div class="menu-item" onclick="apiFetch('CL', 'ЛЧ')"><span class="gold-icon">🔥</span><span class="item-label">ЖБ ДНЯ</span></div>
            <div class="menu-item" onclick="openP('vipP')"><span class="gold-icon">👑</span><span class="item-label">VIP ПРОГНОЗ</span></div>
            <div class="menu-item" onclick="openP('bonusP')"><span class="gold-icon">🎁</span><span class="item-label">Бонусы</span></div>
            <div class="menu-item" onclick="openP('chatP')"><span class="gold-icon">💬</span><span class="item-label">Наш Чат</span></div>
            <div class="menu-item" onclick="openP('profileP')"><span class="gold-icon">👤</span><span class="item-label">Профиль</span></div>
        </div>
    </div>

    <div class="overlay" id="overlay" onclick="closeAll()"></div>
    <div id="predictP" class="popup">
        <h2 id="pTitle" style="color:#fff; font-size:16px;">АНАЛИЗ...</h2>
        <p id="pLeague" style="color:#d4af37; font-size:12px; margin-bottom:20px;"></p>
        <div id="pStats"></div>
        <button class="close-btn" onclick="closeAll()">ЗАКРЫТЬ</button>
    </div>

    <div id="bonusP" class="popup">
        <h2 style="color:#d4af37; margin-bottom:15px;">БОНУСЫ</h2>
        <a href="https://t.me/+oEnEz7IOZ90wN2Ri" target="_blank" class="btn-link">📢 КАНАЛ (+100 LC)</a>
        <a href="https://1wqaxr.com/?p=h14y" target="_blank" class="btn-link">🎰 1WIN БОНУС 500%</a>
        <a href="https://stake.com/?c=LUDIK" target="_blank" class="btn-link" style="background:#2f4553; color:white;">🔥 STAKE</a>
        <button class="close-btn" onclick="closeAll()">ЗАКРЫТЬ</button>
    </div>
    <div id="vipP" class="popup">
        <h2 style="color:#bc13fe; margin-bottom:10px;">VIP ДОСТУП</h2>
        <a href="https://t.me/CryptoBot?start=pay" target="_blank" class="btn-link" style="background:#bc13fe; color:white;">ОПЛАТИТЬ</a>
        <button class="close-btn" onclick="closeAll()">ЗАКРЫТЬ</button>
    </div>
    <div id="chatP" class="popup">
        <h2 style="color:#d4af37; margin-bottom:15px;">ЧАТ</h2>
        <a href="https://t.me/+BrVJbCy5i5hjMjYy" target="_blank" class="btn-link">💬 ВОЙТИ</a>
        <button class="close-btn" onclick="closeAll()">ЗАКРЫТЬ</button>
    </div>
    <div id="profileP" class="popup">
        <h2 style="color:#d4af37; margin-bottom:20px;">ПРОФИЛЬ</h2>
        <div class="row"><span>Баланс:</span><span class="gold-t" id="profBal">100.00</span></div>
        <button class="btn-link" onclick="dailyBonus()" id="dailyBtn">🎁 БОНУС 50 LC</button>
        <button class="close-btn" onclick="closeAll()">ЗАКРЫТЬ</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        
        // Самый надежный способ запуска
        function initApp() {
            tg.ready();
            tg.expand();
            // Настройка цвета шапки под фон
            tg.setHeaderColor('#050505');
            tg.setBackgroundColor('#050505');
        }

        initApp();

        let balance = 100.00;
        const API_KEY = '7a5d573e9f134d42b4edaa35c408e019';

        async function apiFetch(code, name) {
            openP('predictP');
            document.getElementById('pLeague').innerText = name;
            document.getElementById('pTitle').innerText = "АНАЛИЗ...";
            document.getElementById('pStats').innerHTML = '<div style="color:#d4af37; padding:20px;">ЗАГРУЗКА...</div>';

            try {
                const response = await fetch(`https://api.football-data.org/v4/competitions/${code}/matches?status=SCHEDULED`, {
                    headers: { 'X-Auth-Token': API_KEY }
                });const data = await response.json();
                
                if (!data.matches || data.matches.length === 0) {
                    document.getElementById('pTitle').innerText = "НЕТ МАТЧЕЙ";
                    document.getElementById('pStats').innerText = "На сегодня игр больше нет.";
                    return;
                }

                const m = data.matches[0];
                const winner = Math.random() > 0.5 ? m.homeTeam.name : m.awayTeam.name;

                document.getElementById('pTitle').innerText = ${m.homeTeam.name} — ${m.awayTeam.name};
                document.getElementById('pStats').innerHTML = `
                    <div class="row"><span>ПРОГНОЗ:</span><span class="gold-t">Победа ${winner}</span></div>
                    <div class="row"><span>КФ:</span><span class="gold-t">${(Math.random()*(1.9-1.4)+1.4).toFixed(2)}</span></div>
                    <div class="row"><span>ТОТАЛ:</span><span>2.5 Б</span></div>
                    <p style="font-size:10px; color:#555; margin-top:10px;">Старт: ${new Date(m.utcDate).toLocaleString()}</p>
                `;
            } catch (e) {
                document.getElementById('pTitle').innerText = "API ERROR";
            }
        }

        function dailyBonus() {
            balance += 50;
            document.getElementById('userBalance').innerText = balance.toFixed(2);
            document.getElementById('profBal').innerText = balance.toFixed(2);
            document.getElementById('dailyBtn').innerText = "ПОЛУЧЕНО";
            document.getElementById('dailyBtn').disabled = true;
        }
        function openP(id) {
            document.getElementById('overlay').style.display = 'block';
            document.getElementById(id).style.display = 'block';
        }
        function closeAll() {
            document.getElementById('overlay').style.display = 'none';
            document.querySelectorAll('.popup').forEach(p => p.style.display = 'none');
        }
    </script>
</body>
</html>
