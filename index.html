<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LUDIK AI</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* Глобальный сброс */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background-color: #050505; /* Глубокий черный */
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .header {
            margin: 10px 0 20px;
            color: #bc13fe; /* Неоновый фиолетовый */
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(188, 19, 254, 0.5);
        }

        .balance-card {
            background: #0d0d12;
            width: 100%;
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            border: 1px solid #bc13fe;
            box-shadow: 0 0 15px rgba(188, 19, 254, 0.3);
            margin-bottom: 25px;
        }

        .balance-label { font-size: 12px; color: #888; margin-bottom: 8px; }

        .balance-val {
            font-size: 40px;
            font-weight: 800;
            /* Золотой градиент */
            background: linear-gradient(135deg, #ffcf48 0%, #d4af37 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            width: 100%;
        }

        .item {
            background: #12121a;
            padding: 18px;
            border-radius: 18px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .item span { display: block; }
        .icon { font-size: 24px; margin-bottom: 5px; }
        .label { font-size: 13px; color: #ccc; }

        .main-btn {
            width: 100%;
            background: linear-gradient(135deg, #ffcf48 0%, #d4af37 100%);
            color: black;
            padding: 16px;
            border-radius: 50px;
            margin-top: auto;
            margin-bottom: 20px;
            font-weight: 800;
            text-transform: uppercase;
            border: none;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3);
        }
    </style>
</head>
<body>

    <div class="header" id="userHeader">LUDIK AI PREDICTOR</div>

    <div class="balance-card">
        <div class="balance-label">ТВОЙ БАЛАНС</div>
        <div class="balance-val" id="userBalance">100.00</div>
        <div style="color: #bc13fe; font-size: 10px; margin-top: 5px; font-weight: bold;">LUDIK COINS</div>
    </div>

    <div class="grid">
        <div class="item"><span class="icon">📈</span><span class="label">Статистика</span></div>
        <div class="item"><span class="icon">💎</span><span class="label">VIP Чат</span></div>
        <div class="item"><span class="icon">🎁</span><span class="label">Бонусы</span></div>
        <div class="item"><span class="icon">⚙️</span><span class="label">Профиль</span></div>
    </div>

    <button class="main-btn" onclick="runAi()">ЗАПУСТИТЬ AI АНАЛИЗ</button>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        // Получаем баланс из ссылки
        const params = new URLSearchParams(window.location.search);
        const bal = params.get('balance');
        if (bal) document.getElementById('userBalance').innerText = bal;

        // Имя пользователя
        if (tg.initDataUnsafe.user) {
            document.getElementById('userHeader').innerText = tg.initDataUnsafe.user.first_name + " | LUDIK AI";
        }

        function runAi() {
            tg.showConfirm("Использовать 10 LC для анализа?", (ok) => {
                if(ok) {
                    tg.sendData("analyze_now");
                    tg.close();
                }
            });
        }
    </script>
</body>
</html>
