<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LUDIK AI PREDICTOR</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --neon: #bc13fe;
            --gold: linear-gradient(180deg, #ffe57e 0%, #d4af37 40%, #b8860b 100%);
            --glass: rgba(15, 15, 15, 0.98);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { background-color: var(--bg); color: white; font-family: 'Inter', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 10px; min-height: 100vh; overflow-x: hidden; }
        
        .app-title { font-family: 'Orbitron', sans-serif; font-size: 18px; background: var(--gold); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 10px 0; text-align: center; letter-spacing: 1px; }
        
        .main-card { width: 100%; max-width: 400px; background: var(--glass); border: 2px solid var(--neon); border-radius: 30px; padding: 15px; box-shadow: 0 0 30px rgba(188, 19, 254, 0.2); z-index: 10; }
        
        .balance-box { text-align: center; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .balance-amount { font-size: 34px; font-weight: 900; background: var(--gold); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .menu-item { background: linear-gradient(145deg, #1a1a1a, #0d0d0d); border: 1px solid rgba(212, 175, 55, 0.15); border-radius: 18px; padding: 12px; text-align: center; cursor: pointer; }
        .menu-item:active { transform: scale(0.95); border-color: var(--neon); }
        .gold-icon { font-size: 22px; display: block; margin-bottom: 4px; }
        .item-label { font-size: 10px; color: #f3cf7a; text-transform: uppercase; font-weight: 800; }
        
        /* POPUP СИСТЕМА */
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(8px); z-index: 99; }
        .popup { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 90%; max-width: 360px; background: #0f0f0f; border: 2px solid #d4af37; border-radius: 25px; padding: 20px; z-index: 100; max-height: 85vh; overflow-y: auto; text-align: center; }
        
        .predict-header { border-bottom: 1px solid #333; margin-bottom: 12px; padding-bottom: 8px; }
        .predict-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 13px; border-bottom: 1px dashed #222; padding-bottom: 4px; text-align: left; }
        .row-label { color: #888; }
        .row-value { color: #fff; font-weight: bold; }
        .gold-val { color: #d4af37; }

        .btn-link { display: block; width: 100%; background: var(--gold); color: black; text-decoration: none; padding: 12px; border-radius: 12px; font-weight: 900; margin-bottom: 8px; text-transform: uppercase; font-size: 11px; text-align: center; border: none; cursor: pointer; }
        .close-btn { background: none; border: 1px solid #444; color: #888; padding: 10px; width: 100%; border-radius: 12px; margin-top: 10px; font-size: 12px; cursor: pointer; }
        
        .profile-stat-box { background: rgba(255,255,255,0.05); padding: 12px; border-radius: 15px; margin-bottom: 15px; text-align: left; }
    </style>
</head>
<body>

    <div class="app-title">LUDIK AI PREDICTOR</div>

    <div class="main-card">
        <div class="balance-box">
            <p style="font-size: 9px; color: #888; letter-spacing: 1px;">MY BALANCE</p>
            <div id="userBalance" class="balance-amount">100.00</div><div class="predict-row"><span class="row-label">Точность AI:</span><span class="row-value">94.2%</span></div>
        </div>
        <button class="btn-link" onclick="claimDaily()" id="dailyBtn">🎁 ЕЖЕДНЕВНЫЙ БОНУС</button>
        <p style="font-size:10px; color:#666; margin: 10px 0;">РЕФЕРАЛЬНАЯ ПРОГРАММА</p>
        <button class="btn-link" style="background:none; border:1px solid #d4af37; color:#d4af37;" onclick="copyRef()">КОПИРОВАТЬ ССЫЛКА</button>
        <button class="close-btn" onclick="closeAll()">ЗАКРЫТЬ</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        const urlParams = new URLSearchParams(window.location.search);
        let balance = parseFloat(urlParams.get('balance')) || 100.00;
        document.getElementById('userBalance').innerText = balance.toFixed(2);

        // РЕАЛЬНЫЕ МАТЧИ НА СЕГОДНЯ (22.02) И ЗАВТРА (23.02)
        const db = {
            'PL': { l:'Premier League (Сегодня)', t:'Арсенал — Ливерпуль', r:'П1', k:'2.35', g:'2.5 Б', c:'10.5 Б', y:'4.5 Б' },
            'PD': { l:'La Liga (Сегодня)', t:'Атлетик — Вильярреал', r:'П1', k:'1.78', g:'1.5 Б', c:'8.5 Б', y:'5.5 Б' },
            'BL1': { l:'Bundesliga (Сегодня)', t:'Боруссия М — Айнтрахт', r:'X2', k:'1.55', g:'2.5 Б', c:'9.5 Б', y:'3.5 Б' },
            'SA': { l:'Serie A (Сегодня)', t:'Лечче — Фиорентина', r:'П2', k:'2.10', g:'1.5 Б', c:'8.5 Б', y:'4.5 Б' },
            'FL1': { l:'Ligue 1 (Сегодня)', t:'Лион — Нант', r:'П1', k:'1.65', g:'2.5 Б', c:'9.5 Б', y:'3.5 Б' },
            'DED': { l:'Eredivisie (Завтра)', t:'Утрехт — Хераклес', r:'П1', k:'1.45', g:'2.5 Б', c:'11.5 Б', y:'2.5 Б' },
            'PPL': { l:'Primeira Liga (Завтра)', t:'Витория Г. — Каза Пия', r:'П1', k:'1.70', g:'1.5 Б', c:'8.5 Б', y:'5.5 Б' },
            'JB': { l:'ЖЕЗОБЕТОН (Сегодня)', t:'Фенербахче — Касымпаша', r:'П1 + ТБ 2.5', k:'1.82', g:'3.5 Б', c:'10.5 Б', y:'3.5 Б' }
        };

        function getAI(code) {
            tg.HapticFeedback.impactOccurred('heavy');
            const data = db[code];
            if(!data) return;
            document.getElementById('popTeamName').innerText = data.t;
            document.getElementById('popLeagueName').innerText = data.l;
            document.getElementById('popStats').innerHTML = `
                <div class="predict-row"><span class="row-label">Основная ставка</span><span class="row-value gold-val">${data.r} (кф ${data.k})</span></div>
                <div class="predict-row"><span class="row-label">Тотал голов</span><span class="row-value">${data.g}</span></div>
                <div class="predict-row"><span class="row-label">Угловые</span><span class="row-value">${data.c}</span></div>
                <div class="predict-row"><span class="row-label">Желтые карточки</span><span class="row-value">${data.y}</span></div>
                <div class="predict-row"><span class="row-label">Вероятность AI</span><span class="row-value" style="color:#00ff00">91%</span></div>
            `;
            openPop('predictPop');
        }

        function claimDaily() {
            tg.HapticFeedback.notificationOccurred('success');
            balance += 50;
            document.getElementById('userBalance').innerText = balance.toFixed(2);
            const btn = document.getElementById('dailyBtn');
            btn.innerText = "ПОЛУЧЕНО ✅";
            btn.disabled = true;
            btn.style.opacity = "0.5";
            tg.showAlert("Бонус +50 LC зачислен!");
        }

        function copyRef() {
            tg.HapticFeedback.impactOccurred('medium');
            const link = "https://t.me/LUDIKWIN_BOT?start=" + Math.floor(Math.random()*9999);
            const el = document.createElement('textarea');
            el.value = link;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            tg.showAlert("Ссылка скопирована!");
        }

        function openPop(id) {
            document.getElementById('overlay').style.display = 'block';document.getElementById(id).style.display = 'block';
            tg.HapticFeedback.selectionChanged();
        }

        function closeAll() {
            document.getElementById('overlay').style.display = 'none';
            const pops = document.querySelectorAll('.popup');
            pops.forEach(p => p.style.display = 'none');
        }
    </script>
</body>
</html>
