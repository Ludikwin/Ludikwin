<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LUDIK AI</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --neon: #bc13fe;
            --gold: linear-gradient(180deg, #ffe57e 0%, #d4af37 40%, #b8860b 100%);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { background-color: var(--bg); color: white; font-family: 'Inter', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 15px; min-height: 100vh; }
        
        .app-title { font-family: 'Orbitron', sans-serif; font-size: 18px; background: var(--gold); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 15px 0; }
        
        .main-card { width: 100%; max-width: 400px; background: rgba(15,15,15,0.98); border: 2px solid var(--neon); border-radius: 30px; padding: 20px; box-shadow: 0 0 20px rgba(188, 19, 254, 0.2); }
        
        .balance-box { text-align: center; margin-bottom: 20px; }
        .balance-amount { font-size: 36px; font-weight: 900; background: var(--gold); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .menu-item { background: #111; border: 1px solid rgba(212, 175, 55, 0.2); border-radius: 20px; padding: 15px; text-align: center; cursor: pointer; }
        .menu-item:active { background: #1a1a1a; transform: scale(0.96); }
        .gold-icon { font-size: 24px; display: block; margin-bottom: 5px; }
        .item-label { font-size: 10px; color: #f3cf7a; text-transform: uppercase; font-weight: 800; }
        
        /* POPUPS */
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(5px); z-index: 99; }
        .popup { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 85%; background: #0a0a0a; border: 2px solid #d4af37; border-radius: 25px; padding: 20px; z-index: 100; text-align: center; }
        
        .row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 13px; border-bottom: 1px solid #222; padding-bottom: 5px; }
        .gold-t { color: #d4af37; font-weight: bold; }
        
        .btn-link { display: block; width: 100%; background: var(--gold); color: black; text-decoration: none; padding: 12px; border-radius: 12px; font-weight: 900; margin-bottom: 10px; text-transform: uppercase; font-size: 11px; border: none; }
        .close-btn { background: none; border: 1px solid #444; color: #888; padding: 10px; width: 100%; border-radius: 12px; margin-top: 5px; font-size: 12px; }
    </style>
</head>
<body>

    <div class="app-title">LUDIK AI PREDICTOR</div>

    <div class="main-card">
        <div class="balance-box">
            <p style="font-size: 10px; color: #888;">БАЛАНС</p>
            <div id="userBalance" class="balance-amount">100.00</div>
            <p style="color: var(--neon); font-size: 10px; font-weight: 900;">LUDIK COINS</p>
        </div>

        <div class="menu-grid">
            <div class="menu-item" onclick="showAI('PL')"><span class="gold-icon">🏴󠁧󠁢󠁥󠁮󠁧󠁿</span><span class="item-label">АПЛ</span></div>
            <div class="menu-item" onclick="showAI('PD')"><span class="gold-icon">🇪🇸</span><span class="item-label">Ла Лига</span></div>
            <div class="menu-item" onclick="showAI('BL1')"><span class="gold-icon">🇩🇪</span><span class="item-label">Бундеслига</span></div>
            <div class="menu-item" onclick="showAI('SA')"><span class="gold-icon">🇮🇹</span><span class="item-label">Серия А</span></div><div class="menu-item" onclick="showAI('JB')"><span class="gold-icon">🔥</span><span class="item-label">ЖБ ДНЯ</span></div>
            <div class="menu-item" onclick="openP('vipP')"><span class="gold-icon">👑</span><span class="item-label">VIP</span></div>
            <div class="menu-item" onclick="openP('bonusP')"><span class="gold-icon">🎁</span><span class="item-label">Бонусы</span></div>
            <div class="menu-item" onclick="openP('profileP')"><span class="gold-icon">👤</span><span class="item-label">Профиль</span></div>
        </div>
    </div>

    <div class="overlay" id="overlay" onclick="closeAll()"></div>

    <div id="predictP" class="popup">
        <h2 id="pTitle" style="color:#fff; margin-bottom:5px; font-size:16px;">Матч</h2>
        <p id="pLeague" style="color:#d4af37; font-size:10px; margin-bottom:15px;">Лига</p>
        <div id="pStats"></div>
        <button class="close-btn" onclick="closeAll()">ЗАКРЫТЬ</button>
    </div>

    <div id="bonusP" class="popup">
        <h2 style="color:#d4af37; margin-bottom:15px;">БОНУСЫ</h2>
        <a href="https://t.me/+oEnEz7IOZ90wN2Ri" class="btn-link">КАНАЛ (+100 LC)</a>
        <a href="https://1wqaxr.com/?p=h14y" class="btn-link">1WIN (500%)</a>
        <a href="https://stake.com/?c=LUDIK" class="btn-link">STAKE (РЕЙКБЕК)</a>
        <a href="https://t.me/+BrVJbCy5i5hjMjYy" class="btn-link" style="background:none; border:1px solid #bc13fe; color:#bc13fe;">НАШ ЧАТ 💬</a>
        <button class="close-btn" onclick="closeAll()">ЗАКРЫТЬ</button>
    </div>

    <div id="vipP" class="popup">
        <h2 style="color:#bc13fe; margin-bottom:10px;">VIP ДОСТУП</h2>
        <p style="font-size:12px; color:#aaa; margin-bottom:15px;">Приватные прогнозы с точностью 95%</p>
        <a href="https://t.me/CryptoBot?start=pay" class="btn-link" style="background:#bc13fe; color:white;">ОПЛАТИТЬ ($15)</a>
        <button class="close-btn" onclick="closeAll()">ЗАКРЫТЬ</button>
    </div>

    <div id="profileP" class="popup">
        <h2 style="color:#d4af37; margin-bottom:15px;">ПРОФИЛЬ</h2>
        <div style="text-align:left; background:#111; padding:10px; border-radius:12px; margin-bottom:10px;">
            <div class="row"><span>Ранг:</span><span class="gold-t">МАСТЕР</span></div>
            <div class="row"><span>Точность:</span><span style="color:#0f0">92%</span></div>
        </div>
        <button class="btn-link" onclick="daily()" id="dBtn">ПОЛУЧИТЬ БОНУС</button>
        <button class="btn-link" style="background:none; border:1px solid #d4af37; color:#d4af37;" onclick="copyR()">ССЫЛКА ДЛЯ ДРУГА</button>
        <button class="close-btn" onclick="closeAll()">ЗАКРЫТЬ</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        // Загрузка баланса
        const urlParams = new URLSearchParams(window.location.search);
        let balance = parseFloat(urlParams.get('balance')) || 100.00;
        document.getElementById('userBalance').innerText = balance.toFixed(2);

        const data = {
            'PL': { l:'АПЛ (Сегодня)', t:'Арсенал — Ливерпуль', r:'П1', k:'2.35', g:'2.5 Б', c:'10.5 Б', y:'4.5 Б' },
            'PD': { l:'ЛА ЛИГА (Сегодня)', t:'Атлетик — Вильярреал', r:'П1', k:'1.78', g:'1.5 Б', c:'8.5 Б', y:'5.5 Б' },
            'BL1': { l:'БУНДЕСЛИГА (Сегодня)', t:'Боруссия М — Айнтрахт', r:'X2', k:'1.55', g:'2.5 Б', c:'9.5 Б', y:'3.5 Б' },
            'SA': { l:'СЕРИЯ А (Сегодня)', t:'Лечче — Фиорентина', r:'П2', k:'2.10', g:'1.5 Б', c:'8.5 Б', y:'4.5 Б' },
            'JB': { l:'ЖБ ДНЯ (СЕГОДНЯ)', t:'Фенербахче — Касымпаша', r:'П1 + ТБ 2.5', k:'1.82', g:'3.5 Б', c:'10.5 Б', y:'3.5 Б' }
        };

        function showAI(code) {
            tg.HapticFeedback.impactOccurred('heavy');
            const m = data[code];
            document.getElementById('pTitle').innerText = m.t;
            document.getElementById('pLeague').innerText = m.l;
            document.getElementById('pStats').innerHTML = `
                <div class="row"><span>Ставка</span><span class="gold-t">${m.r} (кф ${m.k})</span></div>
                <div class="row"><span>Тотал</span><span>${m.g}</span></div>
                <div class="row"><span>Углы</span><span>${m.c}</span></div>
                <div class="row"><span>Карточки</span><span>${m.y}</span></div>
            `;
            openP('predictP');
        }

        function daily() {
            balance += 50;
            document.getElementById('userBalance').innerText = balance.toFixed(2);
            document.getElementById('dBtn').innerText = "ПОЛУЧЕНО ✅";
            document.getElementById('dBtn').disabled = true;
            tg.HapticFeedback.notificationOccurred('success');
            tg.showAlert("Бонус +50 монет зачислен!");
        }

        function copyR() {
            const link = "https://t.me/LUDIKWIN_BOT?start=user" + Math.floor(Math.random()*1000);
            navigator.clipboard.writeText(link).then(() => {
                tg.showAlert("Ссылка скопирована!");
            });
        }

        function openP(id) {
            document.getElementById('overlay').style.display = 'block';
            document.getElementById(id).style.display = 'block';
            tg.HapticFeedback.selectionChanged();
        }

        function closeAll() {
            document.getElementById('overlay').style.display = 'none';
            const pops = document.querySelectorAll('.popup');
            pops.forEach(p => p.style.display = 'none');
        }
    </script>
</body>
</html>
